# Default values for DataPond
# This is a YAML-formatted file.

# Global settings
global:
  domain: datapond.local
  storageClass: local-path
  imagePullPolicy: IfNotPresent
  # External URL scheme as seen by browsers. Set to "https" when a TLS-terminating
  # proxy/LB (e.g. AWS ALB) sits in front — apps that build absolute URLs (Airflow
  # BASE_URL, redirects) must emit https or the browser blocks them as Mixed Content.
  externalScheme: http

# Namespace
namespace: datapond

# Pull secrets for private registries (e.g. ECR regcred on single-node prod). Empty on
# profiles that use public images.
imagePullSecrets: []

# Ingress configuration
ingress:
  enabled: true
  className: traefik  # or nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: ""
    # WebSocket support — required for log streaming and real-time features
    nginx.org/websocket-services: "backend,frontend"
  tls:
    enabled: false
    secretName: datapond-tls

# Frontend (Next.js)
frontend:
  enabled: true
  name: frontend
  replicas: 2
  image:
    repository: datapond/frontend
    tag: ""   # empty ⇒ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  env:
    - name: NEXT_PUBLIC_API_URL
      value: "http://datapond.local/api"
    - name: NODE_ENV
      value: "production"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# Backend (FastAPI)
backend:
  enabled: true
  name: backend
  serviceAccountName: datapond-backend
  replicas: 2
  image:
    repository: datapond/backend
    tag: ""   # empty ⇒ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  env:
    - name: ENVIRONMENT
      value: "production"
    # NOTE: DATABASE_URL and REDIS_URL are constructed in backend-deployment.yaml from
    # POSTGRES_HOST/PORT/etc (externalDatabase-aware). Do NOT hardcode DATABASE_URL here —
    # a static "@postgres:5432" entry is appended AFTER the constructed one and overrides it,
    # silently breaking external-DB (Aurora/RDS) connectivity.

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# PostgreSQL
postgres:
  enabled: true
  name: postgres
  image:
    # pgvector image = drop-in superset of postgres:16 (adds the `vector` extension for
    # the AI vector store / RAG). Data dir is plain PG16, so this is a drop-in swap.
    repository: pgvector/pgvector
    tag: "0.8.4-pg16"

  service:
    type: ClusterIP
    port: 5432

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    storageClass: local-path
    size: 50Gi
    accessMode: ReadWriteOnce

  auth:
    database: datapond
    username: datapond
    password: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)

  # High Availability (optional)
  replication:
    enabled: false
    replicas: 2

# Valkey (Redis-compatible, BSD 3-Clause License)
# Redis protocol 100% compatible, safe for commercial and SaaS use
valkey:
  enabled: true
  name: valkey
  image:
    repository: valkey/valkey
    tag: "7.2.5"  # Latest stable version

  service:
    type: ClusterIP
    port: 6379  # Redis-compatible port

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 5Gi

  # High Availability (optional)
  replication:
    enabled: false
    replicas: 3

# JupyterLab
jupyter:
  enabled: true
  name: jupyterlab
  replicas: 1
  image:
    repository: datapond/jupyter
    tag: ""   # empty ⇒ chart appVersion (Chart.yaml); override for local dev / CD sha tags

  service:
    type: ClusterIP
    port: 8888

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    size: 20Gi

  env:
    - name: JUPYTER_ENABLE_LAB
      value: "yes"

  auth:
    # JupyterLab token. Empty ⇒ Helm generates & preserves (retrieve:
    # kubectl -n datapond get secret datapond-secrets -o jsonpath='{.data.JUPYTER_TOKEN}' | base64 -d)
    token: ""

  # Git integration extensions
  extensions:
    git: true        # jupyterlab-git extension (GUI for Git operations)
    nbdime: true     # nbdime (notebook diff/merge tool)

  # Default Git configuration
  gitConfig:
    defaultUser: "DataPond User"
    defaultEmail: "user@datapond.local"

  # RLS Layer 3 — sanctioned DuckDB helper (datapond_lake) blocking direct reads of
  # sensitive tables. Off by default; enable with backend RLS_ENABLED. See docs/RLS_DESIGN.md §6.
  rlsGuard:
    enabled: false

# MLflow
mlflow:
  enabled: true
  name: mlflow
  replicas: 1
  image:
    repository: ghcr.io/mlflow/mlflow
    tag: v2.10.0

  service:
    type: ClusterIP
    port: 5000

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  persistence:
    enabled: true
    size: 20Gi

  backend:
    type: postgresql  # postgresql or sqlite
    host: postgres
    port: 5432
    database: mlflow
    username: datapond

# Airflow
airflow:
  enabled: true
  name: airflow
  image:
    repository: apache/airflow
    tag: "2.8.1"

  # Airflow Webserver
  webserver:
    replicas: 2
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # Airflow Scheduler
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # Airflow Worker (Celery)
  worker:
    enabled: false
    replicas: 2
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  persistence:
    enabled: true
    dags:
      size: 10Gi
    logs:
      size: 10Gi

  executor: LocalExecutor  # LocalExecutor or CeleryExecutor

  auth:
    username: airflow
    password: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)

  # SMTP alert configuration
  # Set smtp.enabled: true and configure your mail server to enable email alerts
  smtp:
    enabled: false
    host: "smtp.gmail.com"
    port: "587"
    starttls: "True"
    ssl: "False"
    user: ""                              # SMTP username (e.g. alerts@company.com)
    # password: set via AIRFLOW_SMTP_PASSWORD in datapond-secrets
    mailFrom: "DataPond Alerts <datapond-alerts@company.com>"

# Spark
spark:
  enabled: true
  name: spark
  image:
    repository: apache/spark
    tag: "3.5.8-python3"

  # Spark Master
  master:
    replicas: 1
    service:
      type: ClusterIP
      webPort: 8080
      sparkPort: 7077
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # Spark Workers
  worker:
    replicas: 2
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    env:
      - name: SPARK_WORKER_CORES
        value: "2"
      - name: SPARK_WORKER_MEMORY
        value: "4G"

# MinIO (S3-compatible object store). Default OFF; non-AWS profiles opt in.
# AWS profile uses native S3 (see values-aws.yaml).
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: "RELEASE.2025-09-07T16-13-09Z"
  auth:
    rootUser: datapond
    rootPassword: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)
  persistence:
    size: 50Gi
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

# Object storage. Default = AWS-native S3 (endpoint empty → AWS regional
# endpoint + IAM role). Non-AWS profiles set endpoint to their MinIO service.
storage:
  provider: s3
  endpoint: ""
  region: us-east-1

# External managed database (AWS RDS/Aurora). Disabled by default; the AWS
# profile (values-aws.yaml) enables it. Base skeleton keeps --strict renders safe.
externalDatabase:
  enabled: false
  port: 5432

# Trino (SQL Analytics with Iceberg)
trino:
  enabled: true
  name: trino
  replicas: 1
  image:
    repository: trinodb/trino
    tag: "482"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""

  # RLS Layer 2 — Trino file-based access control (row filters + column masks).
  # Off by default; enable together with backend RLS_ENABLED once policies exist.
  # See docs/RLS_DESIGN.md.
  rls:
    enabled: false
    configMapName: trino-access-control
    refreshPeriod: 30s

# Monitoring
monitoring:
  enabled: true

  prometheus:
    enabled: true
    retention: 15d
    storage: 50Gi

  grafana:
    enabled: true
    adminUser: admin
    adminPassword: ""  # set explicitly if you enable grafana (no template consumes this yet)

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  interval: 30s

# Network Policies
networkPolicies:
  enabled: false

# Pod Security Policies
podSecurityPolicy:
  enabled: false

# Apache Polaris (Iceberg REST Catalog)
polaris:
  enabled: true
  name: polaris
  replicas: 2

  image:
    repository: apache/polaris
    tag: "1.4.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8181

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # PostgreSQL database for Polaris metadata
  database: polaris_catalog

  # Authentication
  auth:
    realm: default-realm
    clientId: polaris-client
    clientSecret: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)

  # Catalog name (Trino warehouse identifier) — created by polaris-catalog-init Job
  catalogName: iceberg
  # Medallion namespaces auto-created in the catalog after bootstrap
  initNamespaces:
    - raw
    - refined
    - serving

  # Storage configuration (uses MinIO)
  warehouseBucket: iceberg   # S3 bucket auto-created in MinIO (minio-bucket-init Job)
  storage:
    type: s3
    defaultBaseLocation: s3://iceberg/warehouse

# RisingWave (Real-time Streaming SQL)
risingwave:
  enabled: true
  name: risingwave
  image:
    repository: risingwavelabs/risingwave
    tag: "v1.7.0"
    pullPolicy: IfNotPresent

  # PostgreSQL database for RisingWave metadata
  database: risingwave

  # Meta Node (Metadata management)
  meta:
    replicas: 1
    service:
      port: 5690
      dashboardPort: 5691
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # Frontend (SQL entry point)
  frontend:
    replicas: 2
    service:
      type: ClusterIP
      port: 4566  # PostgreSQL wire protocol
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # Compute Nodes (Stream processing)
  compute:
    replicas: 2
    service:
      port: 5688
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # Compactor (Storage optimization)
  compactor:
    replicas: 1
    service:
      port: 6660
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

# OpenMetadata (Data Catalog & Lineage)
openmetadata:
  enabled: true
  name: openmetadata
  # ingestion-bot JWT for backend service auth (lineage/quality). Empty = backend
  # falls back to basic-auth login. Get from OM DB: user_entity(name='ingestion-bot')
  # → json.authenticationMechanism.config.JWTToken. (env: OPENMETADATA_JWT_TOKEN)
  jwtToken: ""
  # basic-auth fallback creds (used only when jwtToken empty). Set password to the
  # OM instance's actual admin password; otherwise the fallback login will 401.
  email: "admin@open-metadata.org"
  password: ""

  # PostgreSQL database for OpenMetadata metadata
  database: openmetadata_catalog

  # Authentication
  auth:
    provider: "basic"  # Options: basic, google, okta, auth0, azure, custom-oidc
    adminUser: admin
    adminPassword: admin  # CHANGE IN PRODUCTION!

  # OpenMetadata Server
  server:
    replicas: 1
    image:
      repository: openmetadata/server
      tag: "1.3.1"
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8585

    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Java heap settings
    javaOpts:
      xms: "1024m"
      xmx: "2048m"

  # Elasticsearch for search indexing
  elasticsearch:
    replicas: 1
    image:
      repository: docker.elastic.co/elasticsearch/elasticsearch
      tag: "8.10.2"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

    # Java heap settings (should be 50% of memory limit)
    javaOpts:
      xms: "1g"
      xmx: "2g"

    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""

  # Pipeline Service Client (for Airflow integration)
  pipelineServiceClient:
    enabled: true
    className: "org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient"

# ── Auth / sessions ───────────────────────────────────────────────────────────
# jwtSecret: leave empty to auto-generate ONCE and preserve across upgrades
# (see secrets.yaml). Set explicitly for declarative/air-gap deploys or to rotate.
# ⚠️ Changing it logs out every active user. tokenExpireHours controls session length.
auth:
  jwtSecret: ""
  tokenExpireHours: 24
  # Optional: pin the initial admin password. Empty ⇒ Helm generates a strong random one
  # (retrieve: kubectl -n datapond get secret datapond-secrets -o jsonpath='{.data.ADMIN_PASSWORD}' | base64 -d).
  adminPassword: ""
  # LDAP / Active Directory authentication (enterprise directories). Off by default.
  # When enabled, login falls back to an LDAP bind for non-local users and
  # auto-provisions them (auth_method=ldap). The local admin keeps working.
  ldap:
    enabled: false
    url: ""                          # ldap://host:389 or ldaps://host:636
    bindDN: ""                       # service account DN for search (blank = anonymous)
    bindPassword: ""                 # → datapond-secrets/LDAP_BIND_PASSWORD
    userBase: ""                     # e.g. ou=people,dc=corp,dc=com
    userFilter: "(uid={username})"   # AD: (sAMAccountName={username})
    dnTemplate: ""                   # optional direct-bind DN (skips service-account search)
    attrEmail: "mail"
    attrName: "cn"
    defaultRole: "viewer"            # role granted to LDAP users
    adminGroup: ""                   # optional group DN/CN whose members get admin

  # OIDC SSO (Enterprise, /ee) — off by default. Requires an enterprise-edition
  # backend image; community images do not contain the endpoints.
  oidc:
    enabled: false
    issuer: ""            # e.g. https://login.microsoftonline.com/<tenant>/v2.0
    clientId: ""
    clientSecret: ""      # → datapond-secrets/OIDC_CLIENT_SECRET (from your IdP; REQUIRED when enabled — SSO logins fail cleanly until set)
    scopes: "openid profile email"
    redirectUrl: ""       # empty ⇒ {externalScheme}://{domain}/api/auth/oidc/callback
    groupClaim: "groups"
    adminGroup: ""        # IdP group whose members get role=admin
    defaultRole: "viewer"

# ── AI / LLM (BYO-LLM 기본) ───────────────────────────────────────────────────
# DataPond는 LiteLLM 게이트웨이 추상화만 기본 제공하고, LLM 추론은 외부 엔드포인트에 위임한다.
# 단일 노드에 무거운 모델(Ollama 7B 등)을 co-locate하지 않는다(자원·성능 부담).
# ai.llmEndpoint를 고객 사내 OpenAI 호환 LLM(vLLM/Ollama/LiteLLM 등)으로 설정.
# 비우면 AI(자연어 SQL)는 비활성(템플릿 폴백)되며 나머지 기능엔 영향 없음.
ai:
  llmEndpoint: ""        # OpenAI 호환 base URL. 예: http://my-llm.internal:8000  (co-located litellm 사용 시 자동 설정)
  llmModel: "default"
  # Korean PII guardrail (local regex, runs before prompts reach the LLM gateway).
  # mask (default) | block | off — masks 주민번호/카드/휴대폰/사업자번호/여권/이메일.
  piiGuardrail: "mask"
  # AI egress policy — which LLM providers this environment may use.
  #   local-only    → sovereign / air-gapped: only on-prem LLMs (Ollama/vLLM);
  #                   external providers (Bedrock/Anthropic/OpenAI/Gemini) are blocked
  #                   at registration AND at call time (no data leaves the cluster).
  #   cloud-allowed → external providers permitted (default, backward compatible).
  egressPolicy: "cloud-allowed"
  # Vector store / RAG (pgvector). embedModel = the LiteLLM model_name registered for
  # embeddings (local bge-m3/nomic for sovereign, or Bedrock Titan / OpenAI for cloud).
  # embedDim must match that model's output dim (Titan v2=1024, bge-m3=1024, nomic=768,
  # OpenAI text-embedding-3-small=1536). Changing dim later requires recreating ai_chunks.
  embedModel: "embed"
  embedDim: 1024
  # Optional RAG reranker — a LiteLLM model_name registered for /v1/rerank
  # (e.g. bedrock/amazon.rerank-v1:0, cohere rerank). Empty = vector order only.
  # When set, retrieval over-fetches candidates then reranks down to k for relevance.
  rerankModel: ""

# LiteLLM — AI model gateway (OpenAI-compatible API), single entry point for all LLM
# providers (Bedrock, Anthropic, OpenAI, Ollama/vLLM …). The backend speaks only
# OpenAI-compatible HTTP to this gateway; provider backends are managed at RUNTIME
# from Settings → AI (DB mode), no helm upgrade needed to add/switch a backend.
litellm:
  enabled: true
  name: litellm
  replicas: 1
  image:
    repository: ghcr.io/berriai/litellm
    tag: "v1.91.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 4000

  # ── DB mode (store_model_in_db) ──────────────────────────────────────────────
  # Persists model_list / virtual keys / spend in PostgreSQL so the Settings UI can
  # add/remove/switch backends via the LiteLLM admin API at runtime.
  database: litellm            # PostgreSQL database name (auto-created on first boot)
  # masterKey: admin-API + virtual-key auth. saltKey: encrypts stored model creds.
  # ⚠️ Both MUST stay stable across upgrades (saltKey change → stored creds undecryptable).
  # Leave EMPTY to auto-generate a strong key ONCE on first install and preserve it
  # across upgrades (lookup, see templates/secrets.yaml). Set explicitly to pin a value.
  masterKey: ""
  saltKey: ""

  # Response caching to Valkey (Redis-compatible) — cuts cost/latency on repeat queries.
  cache: true
  # Prometheus metrics at /metrics (enable monitoring stack to scrape).
  metrics: true
  # Gateway guardrails applied to ALL LLM traffic (RAG/chat/sql). Empty = off.
  # Enable per environment, e.g. self-hosted Presidio PII (sovereign) — requires
  # deploying presidio-analyzer/anonymizer and pointing presidio_* at them:
  #   - guardrail_name: "presidio-pii"
  #     litellm_params: { guardrail: presidio, mode: "pre_call" }
  # (DataPond also masks Korean PII in-backend before egress; these layer.)
  guardrails: []

  # LLM request tracing (observability) — opt-in callback to a tracing backend.
  # /metrics (Prometheus) covers counters/latency; tracing captures per-request
  # prompts/responses/errors for debugging RAG quality. Requires the backend service
  # to be reachable (e.g. self-hosted Langfuse). Off by default — enabling without a
  # running backend is a no-op-with-warnings, not a failure.
  tracing:
    enabled: false
    provider: "langfuse"   # litellm callback name (langfuse / otel / ...)
    host: ""               # e.g. http://langfuse.datapond.svc.cluster.local:3000
    publicKey: ""
    secretKey: ""

  # Model fallbacks (reliability) — if a model errors/throttles, the router retries
  # the next model_name in its list. Removes single-model SPOF. Each entry maps a
  # primary model_name to an ordered list of backups. Backups must be registered
  # model_names (chart-seeded or DB-managed). Empty = no fallback (retries same model).
  # e.g.:  - { "default": ["default-fallback"] }
  fallbacks: []

  # DB-mode startup runs Prisma migrations which spike memory — 512Mi OOMKills on
  # first boot. 2Gi limit verified sufficient (steady-state proxy is far lighter).
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  serviceAccount:
    create: true
    name: litellm
    # For EKS IRSA, set the IAM role ARN (keyless Bedrock access). Leave empty
    # on K3s/EC2 (uses the node instance profile) or when using static keys.
    roleArn: ""
  aws:
    # Inject static AWS creds (AWS_ACCESS_KEY_ID/SECRET from datapond-secrets) into
    # the LiteLLM pod for Bedrock. Leave false on EKS (IRSA) or EC2 (instance profile).
    staticCredentials: false

  # Seed model_list rendered into the bootstrap ConfigMap (/app/config.yaml).
  # In DB mode these are merged with DB-managed models; leave empty to manage every
  # backend from the UI. Override per environment profile (e.g. values-aws.yaml).
  config:
    model_list: []

# Ollama — co-located LLM runtime (옵션).
# 기본 OFF: 7B 모델은 4~8GB RAM + CPU 추론이 무거워 단일/소형 노드에 부적합.
# GPU 또는 여유 자원이 있는 대규모 배포에서만 활성화하고, 가능하면 전용 노드에 스케줄.
# 대부분의 배포는 ai.llmEndpoint로 외부/전용 LLM을 가리키는 BYO 방식을 권장.
ollama:
  enabled: false
  name: ollama
  image:
    repository: ollama/ollama
    tag: "0.31.1"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 11434

  # Default model to auto-pull on startup
  # qwen2.5-coder:7b — strong SQL/code model, ~4GB download
  defaultModel: "qwen2.5-coder:7b"
  # LiteLLM model_name this Ollama model is auto-registered under (post-install hook).
  # "default" makes it the model AI SQL calls out of the box — so when ollama+litellm
  # are both enabled (e.g. sovereign on-prem), AI works with a local LLM, no manual setup.
  litellmModelName: "default"

  # Local embedding model for sovereign RAG (no egress). When set, it is pulled on
  # startup and auto-registered in LiteLLM under embedLitellmName (= the backend's
  # AI_EMBED_MODEL, default "embed") so /ai/{ingest,search,rag} use a local embedder.
  # ⚠️ The model's output dimension MUST equal ai.embedDim (ai_chunks vector(N)):
  #   mxbai-embed-large = 1024, bge-m3 = 1024 (match default), nomic-embed-text = 768.
  # Empty = no local embedding registered (RAG then needs a cloud/registered embedder).
  embedModel: ""
  embedLitellmName: "embed"

  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""  # inherit global.storageClass

# ── vLLM — self-hosted OpenAI-compatible LLM server (high-throughput, GPU) ────
# Sovereign alternative/complement to Ollama for heavier models. Serves an
# OpenAI-compatible API; a post-install hook auto-registers it in LiteLLM so AI
# SQL/RAG use it with no manual step. external:false (egress-allowed under local-only).
# GPU strongly recommended — CPU inference is impractical for real workloads.
vllm:
  enabled: false
  name: vllm
  image:
    repository: vllm/vllm-openai
    tag: "v0.24.0"
    pullPolicy: IfNotPresent
  # HuggingFace model id (or mounted local path for air-gap).
  model: "Qwen/Qwen2.5-7B-Instruct"
  # Name vLLM serves the model under (and the LiteLLM litellm_params model = openai/<this>).
  servedModelName: "default-vllm"
  # LiteLLM model_name to register under. "default" makes it the active AI SQL/RAG model.
  litellmModelName: "default"
  # API key vLLM requires from clients (LiteLLM presents it). Empty = no auth (dummy key used).
  apiKey: ""
  # Extra server args, e.g. ["--max-model-len","8192","--dtype","auto","--gpu-memory-utilization","0.9"]
  extraArgs: []
  # HuggingFace token for gated models (optional).
  hfToken: ""
  gpu:
    enabled: true
    count: 1
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 24Gi
  persistence:
    enabled: true
    size: 50Gi          # HuggingFace model cache
    storageClass: ""    # inherit global.storageClass

# ── Iceberg 테이블 유지보수 DAG (P0-3) ────────────────────────────────────────
# 모든 프로파일이 상속하는 기본값. 프로파일에서 override 가능.
maintenance:
  schedule: "0 3 * * *"      # 매일 03:00 (cron). ""이면 수동 실행만
  fileSize: "128MB"          # compaction 목표 파일 크기
  snapshotRetention: "7d"    # 스냅샷 보존창(시간여행 범위) — Trino 최소 7d
  orphanRetention: "7d"      # 고아 파일 보존창

# EKS IRSA — shared IAM role ARN for the S3-consuming lakehouse ServiceAccounts
# (backend/trino/spark/jupyter/mlflow/polaris). Set to `terraform output
# lakehouse_s3_role_arn` on EKS; leave empty on K3s/EC2 (node instance profile) or MinIO.
lakehouseIrsa:
  roleArn: ""
