# Production Environment Configuration
# Requires 32GB+ RAM, 16+ CPU cores

product:
  profile:
    id: self-hosted-extended
    label: Self-Hosted Extended
    description: High-resource self-hosted profile for the full optional OSS data stack.
    maturity: compatibility
    topology: self-hosted-kubernetes

# Global settings
global:
  domain: datapond.yourdomain.com  # CHANGE THIS
  storageClass: local-path
  imagePullPolicy: IfNotPresent

# Namespace
namespace: datapond-prod

# Ingress with TLS
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    enabled: true
    secretName: datapond-tls

# Frontend - High availability
frontend:
  enabled: true
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Backend - High availability
backend:
  enabled: true
  replicas: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# PostgreSQL - Production grade
postgres:
  enabled: true
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 200Gi
  replication:
    enabled: true  # Enable HA
    replicas: 2
  # Auth - MUST CHANGE ALL PASSWORDS
  auth:
    database: datapond
    username: datapond
    password: ""  # empty ⇒ generated (see templates/secrets.yaml)

# Valkey - Production (Redis-compatible)
valkey:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi
  replication:
    enabled: true  # Enable HA
    replicas: 3

# JupyterLab - Full resources
jupyter:
  enabled: true
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 100Gi
  env:
    - name: JUPYTER_ENABLE_LAB
      value: "yes"

# MLflow - Production
mlflow:
  enabled: true
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 100Gi

# Airflow - Production with Celery
airflow:
  enabled: true
  executor: CeleryExecutor
  webserver:
    replicas: 3
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  scheduler:
    replicas: 2
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  worker:
    enabled: true
    replicas: 4
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  persistence:
    enabled: true
    dags:
      size: 50Gi
    logs:
      size: 100Gi
  # Auth - MUST CHANGE ALL PASSWORDS
  auth:
    username: admin
    password: ""  # empty ⇒ generated (see templates/secrets.yaml)

# Spark - Full cluster
spark:
  enabled: true
  master:
    replicas: 1
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  worker:
    replicas: 5
    resources:
      requests:
        cpu: 4000m
        memory: 8Gi
      limits:
        cpu: 8000m
        memory: 16Gi
    env:
      - name: SPARK_WORKER_CORES
        value: "4"
      - name: SPARK_WORKER_MEMORY
        value: "8G"

# Monitoring - Full observability
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 30d
    storage: 200Gi
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: ""  # empty ⇒ generated (see templates/secrets.yaml); set explicitly if you enable grafana

# Security - Production hardening
networkPolicies:
  enabled: true
podSecurityPolicy:
  enabled: true

# Object storage (MinIO) - Production
storage:
  provider: minio
  endpoint: "minio:9000"
  region: us-east-1

minio:
  enabled: true
  clusterIP: 10.43.107.150  # CHANGE THIS!
  auth:
    rootUser: datapond
    rootPassword: ""  # empty ⇒ generated (see templates/secrets.yaml)
  persistence:
    size: 500Gi

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  interval: 15s

# RisingWave - Production cluster
risingwave:
  enabled: true
  meta:
    replicas: 3  # High availability
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  frontend:
    replicas: 3  # Load balancing
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
  compute:
    replicas: 5  # Horizontal scaling
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
  compactor:
    replicas: 2  # Redundancy
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# OpenMetadata - Production cluster
openmetadata:
  enabled: true
  server:
    replicas: 2  # High availability
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    javaOpts:
      xms: "2048m"
      xmx: "4096m"
  elasticsearch:
    replicas: 3  # Cluster mode
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    javaOpts:
      xms: "2g"
      xmx: "4g"
    persistence:
      size: 200Gi
  auth:
    provider: "custom-oidc"  # Use SSO in production
    adminPassword: ""  # set to your OM instance's admin password (OM manages this itself)
