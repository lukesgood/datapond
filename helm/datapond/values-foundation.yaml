# Portable Core — AWS starter profile
# -----------------------------------
# Backward-compatible filename: values-foundation.yaml.
# Runs the lightweight governed-RAG core with native S3, Bedrock through LiteLLM,
# and in-cluster PostgreSQL + pgvector. Optional analytics and governance add-ons
# are disabled; this profile does NOT provision Athena, Glue, EMR, MWAA, DataZone,
# or SageMaker as replacements.
#
# Deploy:
#   helm upgrade --install datapond helm/datapond -n datapond \
#     -f helm/datapond/values-foundation.yaml
#
# To use Aurora instead of in-cluster PostgreSQL, set postgres.enabled=false and
# externalDatabase.enabled=true. For the tested EC2/K3s reference topology, use
# values-prod-single.yaml and follow docs/DEPLOY_SINGLE_NODE.md.

product:
  profile:
    id: portable-core-aws
    label: Portable Core · AWS
    description: Lean governed RAG core using S3 and Bedrock with in-cluster pgvector.
    maturity: supported-starter
    topology: kubernetes

global:
  externalScheme: https

# --- Storage: native Amazon S3 (no in-cluster object store) ---
minio:
  enabled: false
storage:
  provider: s3
  endpoint: ""          # empty ⇒ native AWS S3 + IAM role
  region: us-east-1

# --- AI: Bedrock via LiteLLM ---
ai:
  provider: bedrock
  egressPolicy: "cloud-allowed"
  embedModel: "embed"
  embedDim: 1024

litellm:
  enabled: true
  config:
    model_list:
      - model_name: "embed"
        litellm_params:
          model: "bedrock/amazon.titan-embed-text-v2:0"
          aws_region_name: "us-east-1"
      - model_name: "default"
        litellm_params:
          model: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
          aws_region_name: "us-east-1"
      - model_name: "chat"
        litellm_params:
          model: "bedrock/us.anthropic.claude-sonnet-4-6"
          aws_region_name: "us-east-1"
  # EKS Bedrock access (keyless): set to `terraform output -raw litellm_bedrock_role_arn`
  serviceAccount:
    roleArn: ""

# --- Core (kept) ---
backend:
  enabled: true
frontend:
  enabled: true
postgres:
  enabled: true          # pgvector — the AI vector store
valkey:
  enabled: true          # cache/sessions (lightweight)

# --- Optional data and ML add-ons — DISABLED in Portable Core ---
trino:
  enabled: false
spark:
  enabled: false
polaris:
  enabled: false
airflow:
  enabled: false
mlflow:
  enabled: false
risingwave:
  enabled: false
openmetadata:
  enabled: false
jupyter:
  enabled: false
ollama:
  enabled: false
vllm:
  enabled: false
