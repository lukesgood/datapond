# AWS Hybrid Extended compatibility profile
# -----------------------------------------
# Connects the base OSS-extended chart to S3, Bedrock, and external PostgreSQL.
# It does NOT provision EKS; bring an existing Kubernetes cluster. Because this
# overlay inherits base component defaults, it is heavier than Portable Core.
# Prefer values-foundation.yaml for the lean starter or values-prod-single.yaml
# for the documented EC2/K3s AWS reference.
#
# Usage:
#   helm upgrade datapond helm/datapond \
#     --namespace datapond \
#     --values helm/datapond/values-aws.yaml

product:
  profile:
    id: aws-hybrid-extended
    label: AWS Hybrid Extended
    description: S3, Bedrock, and external PostgreSQL with optional self-hosted OSS data services.
    maturity: compatibility
    topology: bring-your-own-kubernetes

# Before deploying, replace placeholder values:
#   - global.domain
#   - storage region and any catalog warehouse paths used by enabled services
#   - litellm.config model aws_region_name
#   - externalDatabase.host (PostgreSQL-compatible endpoint)

global:
  domain: datapond.example.com   # Replace with actual domain
  storageClass: gp3
  imagePullPolicy: IfNotPresent
  externalScheme: https          # ALB terminates TLS — browsers see https

ingress:
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

# MinIO disabled — use AWS S3 natively
minio:
  enabled: false

# Storage endpoint and credential routing only. This compatibility profile inherits
# the OSS warehouse bucket/path defaults; ensure those buckets exist or override
# polaris.warehouseBucket, polaris.storage.defaultBaseLocation, and other enabled
# service-specific warehouse locations.
storage:
  provider: s3
  endpoint: ""          # empty = use AWS native S3 endpoints
  region: us-east-1

# AI egress policy — AWS profile uses managed Bedrock (external by design).
ai:
  provider: bedrock
  egressPolicy: "cloud-allowed"
  embedModel: "embed"
  embedDim: 1024

vllm:
  enabled: false

# LiteLLM: route to AWS Bedrock
litellm:
  enabled: true
  serviceAccount:
    # Set to the IRSA role ARN from `terraform output litellm_bedrock_role_arn`.
    roleArn: ""   # e.g. arn:aws:iam::<acct>:role/datapond-litellm-bedrock
  config:
    model_list:
      - model_name: "embed"
        litellm_params:
          model: "bedrock/amazon.titan-embed-text-v2:0"
          aws_region_name: "us-east-1"
      - model_name: "default"
        litellm_params:
          model: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
          aws_region_name: "us-east-1"
      - model_name: "chat"
        litellm_params:
          model: "bedrock/us.anthropic.claude-sonnet-4-6"
          aws_region_name: "us-east-1"

# Ollama disabled on AWS — use Bedrock instead
ollama:
  enabled: false

# Backend: HA with autoscaling
backend:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

# In-cluster PostgreSQL is disabled; connect an external PostgreSQL-compatible service.
postgres:
  enabled: false

# External PostgreSQL-compatible connection (set host via secret or override)
externalDatabase:
  enabled: true
  adapter: postgresql
  host: ""          # set at deploy time to a PostgreSQL-compatible endpoint
  port: 5432
  name: datapond
  sslmode: "require"
