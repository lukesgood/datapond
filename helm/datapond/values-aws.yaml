# AWS deployment profile — EKS + S3 + Bedrock
# Usage:
#   helm upgrade datapond helm/datapond \
#     --namespace datapond \
#     --values helm/datapond/values-aws.yaml
#
# Before deploying, replace placeholder values:
#   - global.domain
#   - storage.bucket
#   - storage.region
#   - litellm.config model aws_region_name
#   - externalDatabase.host (RDS endpoint)

global:
  domain: datapond.example.com   # Replace with actual domain
  storageClass: gp3
  imagePullPolicy: IfNotPresent
  externalScheme: https          # ALB terminates TLS — browsers see https

ingress:
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

# MinIO disabled — use AWS S3 natively
minio:
  enabled: false

# Storage: point the backend at AWS S3 (other services rewired in later phases)
storage:
  provider: s3
  endpoint: ""          # empty = use AWS native S3 endpoints
  region: us-east-1
  bucket: datapond-iceberg

# AI egress policy — AWS profile uses managed Bedrock (external by design).
ai:
  egressPolicy: "cloud-allowed"
  embedModel: "embed"
  embedDim: 1024

vllm:
  enabled: false

# LiteLLM: route to AWS Bedrock
litellm:
  enabled: true
  serviceAccount:
    # Set to the IRSA role ARN from `terraform output litellm_bedrock_role_arn`.
    roleArn: ""   # e.g. arn:aws:iam::<acct>:role/datapond-litellm-bedrock
  config:
    model_list:
      - model_name: "embed"
        litellm_params:
          model: "bedrock/amazon.titan-embed-text-v2:0"
          aws_region_name: "us-east-1"
      - model_name: "default"
        litellm_params:
          model: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
          aws_region_name: "us-east-1"
      - model_name: "chat"
        litellm_params:
          model: "bedrock/us.anthropic.claude-sonnet-4-6"
          aws_region_name: "us-east-1"

# Ollama disabled on AWS — use Bedrock instead
ollama:
  enabled: false

# Backend: HA with autoscaling
backend:
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10

# PostgreSQL: disabled — use AWS RDS
postgres:
  enabled: false

# RDS connection (set host via secret or override)
externalDatabase:
  enabled: true
  host: ""          # set at deploy time to the Aurora writer endpoint
  port: 5432
  name: datapond
  sslmode: "require"
