# AWS Single-Node Reference — Portable Core with managed adapters
# ---------------------------------------------------------------
# Current documented AWS reference: EC2 Spot/K3s application node plus external
# Aurora PostgreSQL/pgvector, S3, Glue/Athena, and Bedrock. This is production-
# oriented but intentionally single-node and is not an EKS or HA deployment.
# Set ECR repositories, domain, and externalDatabase.host from Terraform outputs.
#
# Deploy:
#   helm upgrade --install datapond helm/datapond -n datapond \
#     -f helm/datapond/values-prod-single.yaml \
#     --set externalDatabase.host=$(terraform output -raw aurora_endpoint) \
#     --set backend.image.repository=$(terraform output -raw ecr_backend_repo_url) \
#     --set frontend.image.repository=$(terraform output -raw ecr_frontend_repo_url) \
#     --set ingress.domain=<your-domain>

product:
  profile:
    id: aws-single-node
    label: AWS Single-Node Reference
    description: Portable Core on EC2/K3s with Aurora, S3, Glue/Athena, and Bedrock adapters.
    maturity: reference
    topology: ec2-k3s-single-node

# Password-reset email via SES. fromAddress must be a verified SES sender identity
# (datapond.csg.fitcloud.co.kr is verified via Easy DKIM in Route53); the node role
# carries ses:SendEmail. SES sandbox only delivers to verified recipients until
# production access is granted.
email:
  fromAddress: "noreply@datapond.csg.fitcloud.co.kr"
  baseUrl: "https://datapond.csg.fitcloud.co.kr"

namespace: datapond

# Pull the ECR images via the regcred secret the cloud-init ecr-refresh timer maintains.
imagePullSecrets:
  - name: regcred

global:
  externalScheme: https

# --- Storage: native AWS S3 via the node instance profile (no static keys) ---
storage:
  provider: s3
  endpoint: ""
  region: us-east-1

# --- Catalog/query: AWS Glue + Athena adapters.
# The defaults match Terraform's default bucket only. If var.bucket_name changes,
# override BOTH paths from `terraform output -raw bucket_name` as shown in the runbook. ---
catalog:
  backend: glue
  glueWarehouse: "s3://datapond-iceberg/warehouse"
  athenaOutputLocation: "s3://datapond-iceberg/athena-results/"
  athenaWorkgroup: "primary"
  athenaDatabase: "default"

# --- Postgres: external Aurora (not in-cluster) ---
# Set postgres.auth.password to the Aurora master password at deploy time (--set) — the
# backend's POSTGRES_PASSWORD secret must match, or DB auth fails (backend won't come up).
postgres:
  enabled: false
externalDatabase:
  enabled: true
  adapter: aurora
  host: ""          # deploy time: terraform output -raw aurora_endpoint
  port: 5432
  name: datapond
  sslmode: require

# --- Images from ECR (repository set at deploy time; tag = chart appVersion via default) ---
backend:
  enabled: true
  serviceAccountName: datapond-backend
  image:
    repository: ""  # deploy time: terraform output -raw ecr_backend_repo_url
    pullPolicy: IfNotPresent
  # AWS-native observability — the node instance profile carries
  # cloudwatch:PutMetricData (terraform iam.tf), so metrics flow with no extra pods.
  cloudwatchMetrics:
    enabled: true
    namespace: DataPond
frontend:
  enabled: true
  image:
    repository: ""  # deploy time: terraform output -raw ecr_frontend_repo_url
    pullPolicy: IfNotPresent
valkey:
  enabled: true

litellm:
  enabled: true
  config:
    model_list:
      - model_name: "embed"
        litellm_params: { model: "bedrock/amazon.titan-embed-text-v2:0", aws_region_name: "us-east-1" }
      - model_name: "default"
        litellm_params: { model: "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0", aws_region_name: "us-east-1" }
      - model_name: "chat"
        litellm_params: { model: "bedrock/us.anthropic.claude-sonnet-4-6", aws_region_name: "us-east-1" }
      # RAG reranker (Bedrock Rerank via LiteLLM /v1/rerank). Requires Bedrock model
      # ACCESS for amazon.rerank-v1:0 to be granted in this region (Bedrock console →
      # Model access), same as Claude/Titan above. If access isn't granted, calls to
      # this model_name fail and the backend's _rerank() (backend/app/api/ai_vectors.py)
      # catches the error and falls back to plain vector-similarity order — retrieval
      # never hard-fails on a missing/unavailable rerank model.
      - model_name: "rerank"
        litellm_params: { model: "bedrock/amazon.rerank-v1:0", aws_region_name: "us-east-1" }
  # Chat failover — if Haiku(default) throttles/errors, retry on Sonnet(chat) and
  # vice versa, so a single Bedrock model isn't a SPOF for RAG / AI-SQL. (embed has
  # a single Titan model, so no fallback.)
  fallbacks:
    - { "default": ["chat"] }
    - { "chat": ["default"] }
  serviceAccount:
    roleArn: ""     # K3s: empty (node instance profile). Not EKS/IRSA.

# RAG reranker — must match a model_name registered above in litellm.config.model_list.
# Wires AI_RERANK_MODEL into the backend (backend-deployment.yaml). Requires Bedrock
# model ACCESS for amazon.rerank-v1:0 granted in-region (see comment above); if access
# isn't granted, the backend's _rerank() catches the failure and falls back to plain
# vector-similarity order (retrieval never hard-fails on rerank being unavailable).
ai:
  provider: bedrock
  rerankModel: "rerank"

# --- Heavy analytics: AWS-managed (Athena/EMR), not on the node ---
trino: { enabled: false }
spark: { enabled: false }
polaris: { enabled: false }
airflow: { enabled: false }
mlflow: { enabled: false }
jupyter: { enabled: false }
risingwave: { enabled: false }
openmetadata: { enabled: false }
ollama: { enabled: false }
vllm: { enabled: false }
minio: { enabled: false }

# --- Governance: RLS (Layer 1) enforcement — opt-in default_deny keeps this a no-op
# until policies are registered (a table with no policy passes through unfiltered;
# only policy-bearing tables get row-filtered/masked). See backend/app/rls/engine.py
# and docs/RLS_DESIGN.md. Flip defaultDeny to true once policies exist for the tables
# you want to lock down by default.
governance:
  rls:
    enabled: true
    defaultDeny: false

# --- Ingress: real domain + cert-manager Let's Encrypt TLS ---
ingress:
  enabled: true
  className: traefik
  domain: ""        # deploy time: var.domain (e.g. datapond.example.com)
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
    secretName: datapond-tls
