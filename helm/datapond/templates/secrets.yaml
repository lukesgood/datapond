{{- if or .Values.postgres.enabled .Values.seaweedfs.enabled .Values.litellm.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: datapond-secrets
  namespace: {{ .Values.namespace | default "datapond" }}
  labels:
    app.kubernetes.io/name: datapond
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{- if .Values.postgres.enabled }}
  # PostgreSQL credentials
  POSTGRES_DB: {{ .Values.postgres.auth.database | default "datapond" | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | default "datapond" | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | default "changeme" | quote }}
  {{- end }}

  {{- if .Values.seaweedfs.enabled }}
  # SeaweedFS S3 credentials (multiple key names for compatibility)
  S3_ACCESS_KEY: {{ .Values.seaweedfs.auth.s3User | default "datapond" | quote }}
  S3_SECRET_KEY: {{ .Values.seaweedfs.auth.s3Password | default "changeme" | quote }}
  SEAWEEDFS_S3_USER: {{ .Values.seaweedfs.auth.s3User | default "datapond" | quote }}
  SEAWEEDFS_S3_PASSWORD: {{ .Values.seaweedfs.auth.s3Password | default "changeme" | quote }}
  {{- end }}

  # MLflow tracking URI
  MLFLOW_TRACKING_URI: "http://mlflow.{{ .Values.namespace | default "datapond" }}.svc.cluster.local:5000"

  # JWT signing secret. MUST stay stable across upgrades — regenerating it
  # invalidates every active login token (the "sessions keep dropping" bug).
  # Priority: explicit value (.Values.auth.jwtSecret) → existing in-cluster secret
  # (preserved on upgrade via lookup) → freshly generated on first install only.
  {{- $existing := (lookup "v1" "Secret" (.Values.namespace | default "datapond") "datapond-secrets") }}
  {{- $jwt := "" }}
  {{- if (.Values.auth | default dict).jwtSecret }}
  {{- $jwt = .Values.auth.jwtSecret }}
  {{- else if and $existing $existing.data (hasKey $existing.data "JWT_SECRET") }}
  {{- $jwt = index $existing.data "JWT_SECRET" | b64dec }}
  {{- else }}
  {{- $jwt = randAlphaNum 48 }}
  {{- end }}
  JWT_SECRET: {{ $jwt | quote }}

  {{- if .Values.litellm.enabled }}
  # LiteLLM gateway — master key (admin API + virtual-key auth) and salt key.
  # MUST be stable across upgrades: salt key decrypts model credentials stored in
  # LiteLLM's DB, master key authenticates the backend. Set explicitly in values.
  LITELLM_MASTER_KEY: {{ .Values.litellm.masterKey | default "sk-datapond-master-change-me" | quote }}
  LITELLM_SALT_KEY: {{ .Values.litellm.saltKey | default "datapond-litellm-salt-change-me" | quote }}
  {{- end }}

  {{- with .Values.openmetadata.jwtToken }}
  # OpenMetadata ingestion-bot JWT (service auth for lineage/quality integration)
  OPENMETADATA_JWT_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.openmetadata.password }}
  # OpenMetadata basic-auth fallback password
  OPENMETADATA_PASSWORD: {{ . | quote }}
  {{- end }}

  {{- if .Values.airflow.enabled }}
  # Airflow password
  AIRFLOW_PASSWORD: {{ .Values.airflow.auth.password | default "airflow" | quote }}
  {{- end }}

  # Backend API URL (if enabled)
  {{- if .Values.backend.enabled }}
  BACKEND_URL: "http://backend.{{ .Values.namespace | default "datapond" }}.svc.cluster.local:8000"
  {{- end }}
{{- end }}
