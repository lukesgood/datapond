{{- /* Resolved once, shared by every document in this file (single source — avoids
       two independent randAlphaNum calls desyncing on first install). */}}
{{- $existing := (lookup "v1" "Secret" (.Values.namespace | default "datapond") "datapond-secrets") }}
{{- $psec := "" }}
{{- if .Values.polaris.enabled }}
{{- $psec = (((.Values.polaris).auth).clientSecret) | default "" }}
{{- if not $psec }}
{{- if and $existing $existing.data (hasKey $existing.data "POLARIS_CLIENT_SECRET") }}
{{- $psec = index $existing.data "POLARIS_CLIENT_SECRET" | b64dec }}
{{- else }}
{{- /* Upgrade path: preserve the secret Polaris was bootstrapped with (persisted in its
       DB; bootstrap skips on upgrade) from the legacy standalone polaris-secret, which
       still exists in-cluster during the first upgrade to this chart version. */}}
{{- $legacy := (lookup "v1" "Secret" (.Values.namespace | default "datapond") "polaris-secret") }}
{{- if and $legacy $legacy.data (hasKey $legacy.data "clientSecret") }}
{{- $psec = index $legacy.data "clientSecret" | b64dec }}
{{- else }}
{{- $psec = randAlphaNum 32 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if or .Values.postgres.enabled .Values.minio.enabled .Values.litellm.enabled .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: datapond-secrets
  namespace: {{ .Values.namespace | default "datapond" }}
  labels:
    app.kubernetes.io/name: datapond
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{- if .Values.postgres.enabled }}
  # PostgreSQL credentials — password lookup-preserve (explicit → existing → random).
  # NEVER delete this Secret while keeping the postgres PVC: the DB was initialized
  # with this password and a regenerated one will not match.
  POSTGRES_DB: {{ .Values.postgres.auth.database | default "datapond" | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | default "datapond" | quote }}
  {{- $pgpass := (((.Values.postgres).auth).password) | default "" }}
  {{- if not $pgpass }}
  {{- if and $existing $existing.data (hasKey $existing.data "POSTGRES_PASSWORD") }}
  {{- $pgpass = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else }}
  {{- $pgpass = randAlphaNum 24 }}
  {{- end }}
  {{- end }}
  POSTGRES_PASSWORD: {{ $pgpass | quote }}
  {{- end }}

  {{- if .Values.minio.enabled }}
  # MinIO S3 credentials (multiple key names for compatibility). Secret key is
  # lookup-preserve generated; the access-key ID (rootUser) is an identity, not a secret.
  {{- $s3pass := (((.Values.minio).auth).rootPassword) | default "" }}
  {{- if not $s3pass }}
  {{- if and $existing $existing.data (hasKey $existing.data "S3_SECRET_KEY") }}
  {{- $s3pass = index $existing.data "S3_SECRET_KEY" | b64dec }}
  {{- else }}
  {{- $s3pass = randAlphaNum 32 }}
  {{- end }}
  {{- end }}
  S3_ACCESS_KEY: {{ .Values.minio.auth.rootUser | default "datapond" | quote }}
  S3_SECRET_KEY: {{ $s3pass | quote }}
  SEAWEEDFS_S3_USER: {{ .Values.minio.auth.rootUser | default "datapond" | quote }}
  SEAWEEDFS_S3_PASSWORD: {{ $s3pass | quote }}
  {{- end }}

  # MLflow tracking URI
  MLFLOW_TRACKING_URI: "http://mlflow.{{ .Values.namespace | default "datapond" }}.svc.cluster.local:5000"

  # JWT signing secret. MUST stay stable across upgrades — regenerating it
  # invalidates every active login token (the "sessions keep dropping" bug).
  # Priority: explicit value (.Values.auth.jwtSecret) → existing in-cluster secret
  # (preserved on upgrade via lookup) → freshly generated on first install only.
  {{- $jwt := "" }}
  {{- if (.Values.auth | default dict).jwtSecret }}
  {{- $jwt = .Values.auth.jwtSecret }}
  {{- else if and $existing $existing.data (hasKey $existing.data "JWT_SECRET") }}
  {{- $jwt = index $existing.data "JWT_SECRET" | b64dec }}
  {{- else }}
  {{- $jwt = randAlphaNum 48 }}
  {{- end }}
  JWT_SECRET: {{ $jwt | quote }}

  # Internal automation key — trusted in-cluster callers (scheduled Airflow DAGs)
  # present this as X-Internal-Key to reach require_user_or_internal endpoints
  # without a user JWT. Lookup-preserve (same pattern as JWT) so it stays stable.
  {{- $ikey := "" }}
  {{- if (.Values.auth | default dict).internalApiKey }}
  {{- $ikey = .Values.auth.internalApiKey }}
  {{- else if and $existing $existing.data (hasKey $existing.data "INTERNAL_API_KEY") }}
  {{- $ikey = index $existing.data "INTERNAL_API_KEY" | b64dec }}
  {{- else }}
  {{- $ikey = randAlphaNum 40 }}
  {{- end }}
  INTERNAL_API_KEY: {{ $ikey | quote }}

  # Encryption key for credentials-at-rest (connector secrets, stored provider keys).
  # MUST stay stable across upgrades — rotating it makes existing encrypted
  # credentials undecryptable. Lookup-preserve only (no explicit-value override —
  # this key should never be hand-set/copy-pasted between environments).
  {{- $ekey := "" }}
  {{- if and $existing $existing.data (hasKey $existing.data "ENCRYPTION_KEY") }}
  {{- $ekey = index $existing.data "ENCRYPTION_KEY" | b64dec }}
  {{- else }}
  {{- $ekey = randAlphaNum 48 }}
  {{- end }}
  ENCRYPTION_KEY: {{ $ekey | quote }}

  # Initial admin login password. Priority: explicit value (.Values.auth.adminPassword)
  # → existing in-cluster secret (preserved on upgrade via lookup) → freshly generated
  # on first install only. Retrieve the generated value with:
  # kubectl -n datapond get secret datapond-secrets -o jsonpath='{.data.ADMIN_PASSWORD}' | base64 -d
  {{- $apass := "" }}
  {{- if (.Values.auth | default dict).adminPassword }}
  {{- $apass = .Values.auth.adminPassword }}
  {{- else if and $existing $existing.data (hasKey $existing.data "ADMIN_PASSWORD") }}
  {{- $apass = index $existing.data "ADMIN_PASSWORD" | b64dec }}
  {{- else }}
  {{- $apass = randAlphaNum 24 }}
  {{- end }}
  ADMIN_PASSWORD: {{ $apass | quote }}

  {{- if .Values.litellm.enabled }}
  # LiteLLM gateway keys — lookup-preserve (same pattern as JWT) instead of a weak
  # shipped default. masterKey authenticates the backend + admin API; saltKey
  # encrypts model credentials stored in LiteLLM's DB. Both MUST stay stable across
  # upgrades — rotating saltKey makes stored creds undecryptable. Priority: explicit
  # value → existing in-cluster secret (preserved) → strong random on first install.
  {{- $mkey := "" }}
  {{- if .Values.litellm.masterKey }}
  {{- $mkey = .Values.litellm.masterKey }}
  {{- else if and $existing $existing.data (hasKey $existing.data "LITELLM_MASTER_KEY") }}
  {{- $mkey = index $existing.data "LITELLM_MASTER_KEY" | b64dec }}
  {{- else }}
  {{- $mkey = printf "sk-%s" (randAlphaNum 40) }}
  {{- end }}
  LITELLM_MASTER_KEY: {{ $mkey | quote }}
  {{- $skey := "" }}
  {{- if .Values.litellm.saltKey }}
  {{- $skey = .Values.litellm.saltKey }}
  {{- else if and $existing $existing.data (hasKey $existing.data "LITELLM_SALT_KEY") }}
  {{- $skey = index $existing.data "LITELLM_SALT_KEY" | b64dec }}
  {{- else }}
  {{- $skey = randAlphaNum 32 }}
  {{- end }}
  LITELLM_SALT_KEY: {{ $skey | quote }}
  {{- end }}

  {{- with .Values.openmetadata.jwtToken }}
  # OpenMetadata ingestion-bot JWT (service auth for lineage/quality integration)
  OPENMETADATA_JWT_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.openmetadata.password }}
  # OpenMetadata basic-auth fallback password
  OPENMETADATA_PASSWORD: {{ . | quote }}
  {{- end }}

  {{- if .Values.airflow.enabled }}
  # Airflow admin password — lookup-preserve (explicit → existing → random).
  {{- $afpass := (((.Values.airflow).auth).password) | default "" }}
  {{- if not $afpass }}
  {{- if and $existing $existing.data (hasKey $existing.data "AIRFLOW_PASSWORD") }}
  {{- $afpass = index $existing.data "AIRFLOW_PASSWORD" | b64dec }}
  {{- else }}
  {{- $afpass = randAlphaNum 20 }}
  {{- end }}
  {{- end }}
  AIRFLOW_PASSWORD: {{ $afpass | quote }}
  {{- end }}

  {{- if .Values.jupyter.enabled }}
  # JupyterLab token — lookup-preserve. Retrieve:
  # kubectl -n datapond get secret datapond-secrets -o jsonpath='{.data.JUPYTER_TOKEN}' | base64 -d
  {{- $jtok := (((.Values.jupyter).auth).token) | default "" }}
  {{- if not $jtok }}
  {{- if and $existing $existing.data (hasKey $existing.data "JUPYTER_TOKEN") }}
  {{- $jtok = index $existing.data "JUPYTER_TOKEN" | b64dec }}
  {{- else }}
  {{- $jtok = randAlphaNum 32 }}
  {{- end }}
  {{- end }}
  JUPYTER_TOKEN: {{ $jtok | quote }}
  {{- end }}

  {{- if .Values.polaris.enabled }}
  # Polaris OAuth2 client secret — single source of truth (backend + init/bootstrap
  # jobs all read THIS key; the old standalone polaris-secret was removed to avoid
  # two independent randoms desyncing on fresh install). Lookup-preserve.
  # (resolved once at file top as $psec — shared with the spark-defaults Secret below)
  POLARIS_CLIENT_SECRET: {{ $psec | quote }}
  {{- end }}

  {{- with (((.Values.auth).ldap).bindPassword) }}
  # LDAP service-account bind password (for the user search before the user bind)
  LDAP_BIND_PASSWORD: {{ . | quote }}
  {{- end }}

  {{- if .Values.litellm.enabled }}
  {{- with ((.Values.litellm.tracing | default dict).publicKey) }}
  LANGFUSE_PUBLIC_KEY: {{ . | quote }}
  {{- end }}
  {{- with ((.Values.litellm.tracing | default dict).secretKey) }}
  # Langfuse tracing keys — kept out of pod manifests (consumed via secretKeyRef)
  LANGFUSE_SECRET_KEY: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with ((.Values.vllm | default dict).hfToken) }}
  # HuggingFace hub token for vLLM model pulls
  HF_TOKEN: {{ . | quote }}
  {{- end }}

  # Backend API URL (if enabled)
  {{- if .Values.backend.enabled }}
  BACKEND_URL: "http://backend.{{ .Values.namespace | default "datapond" }}.svc.cluster.local:8000"
  {{- end }}
{{- end }}
{{- if .Values.spark.enabled }}
---
# spark-defaults.conf — moved from a ConfigMap into a Secret because it embeds the
# Polaris client credential (resolved above as $psec — same value datapond-secrets
# stores). Mounted read-only into /opt/spark/conf on master + worker.
# NOTE: spark.jars.packages resolves from Maven at job-submit time → needs egress.
#       For air-gap, bake the Iceberg/hadoop-aws/awssdk jars into a custom Spark image
#       (separate task) and drop spark.jars.packages.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.spark.name }}-defaults
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
type: Opaque
stringData:
  spark-defaults.conf: |
    spark.master spark://{{ .Values.spark.name }}-master:{{ .Values.spark.master.service.sparkPort }}
    spark.jars.packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4,software.amazon.awssdk:bundle:2.20.18,software.amazon.awssdk:url-connection-client:2.20.18
    spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.iceberg org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.io-impl org.apache.iceberg.aws.s3.S3FileIO
    {{- if .Values.storage.endpoint }}
    spark.sql.catalog.iceberg.s3.endpoint http://{{ .Values.storage.endpoint }}
    spark.sql.catalog.iceberg.s3.path-style-access true
    {{- end }}
    {{- if .Values.polaris.enabled }}
    spark.sql.catalog.iceberg.catalog-impl org.apache.iceberg.rest.RESTCatalog
    spark.sql.catalog.iceberg.uri http://{{ .Values.polaris.name }}:{{ .Values.polaris.service.port }}/api/catalog/v1
    spark.sql.catalog.iceberg.warehouse {{ .Values.polaris.storage.defaultBaseLocation }}
    spark.sql.catalog.iceberg.credential {{ .Values.polaris.auth.clientId }}:{{ $psec }}
    {{- else }}
    spark.sql.catalog.iceberg.type hadoop
    spark.sql.catalog.iceberg.warehouse s3a://iceberg/warehouse
    {{- end }}
    {{- if .Values.storage.endpoint }}
    spark.hadoop.fs.s3a.endpoint http://{{ .Values.storage.endpoint }}
    spark.hadoop.fs.s3a.path.style.access true
    {{- end }}
    spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
{{- end }}
