{{- if .Values.risingwave.enabled }}
---
# RisingWave Meta Node StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.risingwave.name }}-meta
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.risingwave.name }}
    component: meta
spec:
  serviceName: {{ .Values.risingwave.name }}-meta
  replicas: {{ .Values.risingwave.meta.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.risingwave.name }}
      component: meta
  template:
    metadata:
      labels:
        app: {{ .Values.risingwave.name }}
        component: meta
    spec:
      containers:
      - name: meta
        image: "{{ .Values.risingwave.image.repository }}:{{ .Values.risingwave.image.tag }}"
        command:
          - /risingwave/bin/risingwave
          - meta-node
        args:
          - --listen-addr
          - "0.0.0.0:{{ .Values.risingwave.meta.service.port }}"
          - --advertise-addr
          - "{{ .Values.risingwave.name }}-meta-0.{{ .Values.risingwave.name }}-meta:{{ .Values.risingwave.meta.service.port }}"
          - --dashboard-host
          - "0.0.0.0:{{ .Values.risingwave.meta.service.dashboardPort }}"
          - --backend
          - mem
          - --state-store
          - "hummock+memory"
          - --data-directory
          - "hummock"
        env:
        # S3 (SeaweedFS) credentials
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        - name: AWS_REGION
          value: "us-east-1"
        - name: RW_S3_ENDPOINT
          value: "http://minio:9000"
        - name: RW_S3_PATH_STYLE_ACCESS
          value: "true"
        ports:
        - containerPort: {{ .Values.risingwave.meta.service.port }}
          name: service
        - containerPort: {{ .Values.risingwave.meta.service.dashboardPort }}
          name: dashboard
        resources:
          requests:
            cpu: {{ .Values.risingwave.meta.resources.requests.cpu }}
            memory: {{ .Values.risingwave.meta.resources.requests.memory }}
          limits:
            cpu: {{ .Values.risingwave.meta.resources.limits.cpu }}
            memory: {{ .Values.risingwave.meta.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /
            port: dashboard
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: dashboard
          initialDelaySeconds: 10
          periodSeconds: 5
---
# RisingWave Meta Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.risingwave.name }}-meta
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.risingwave.name }}
    component: meta
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: {{ .Values.risingwave.meta.service.port }}
    targetPort: service
    name: service
  - port: {{ .Values.risingwave.meta.service.dashboardPort }}
    targetPort: dashboard
    name: dashboard
  selector:
    app: {{ .Values.risingwave.name }}
    component: meta
---
# RisingWave Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.risingwave.name }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.risingwave.name }}
    component: frontend
spec:
  replicas: {{ .Values.risingwave.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.risingwave.name }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ .Values.risingwave.name }}
        component: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.risingwave.image.repository }}:{{ .Values.risingwave.image.tag }}"
        command:
          - /risingwave/bin/risingwave
          - frontend-node
        args:
          - --listen-addr
          - "0.0.0.0:{{ .Values.risingwave.frontend.service.port }}"
          - --advertise-addr
          - "$(POD_IP):{{ .Values.risingwave.frontend.service.port }}"
          - --meta-addr
          - "http://{{ .Values.risingwave.name }}-meta-0.{{ .Values.risingwave.name }}-meta:{{ .Values.risingwave.meta.service.port }}"
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: RUST_BACKTRACE
          value: "1"
        ports:
        - containerPort: {{ .Values.risingwave.frontend.service.port }}
          name: postgres
        resources:
          requests:
            cpu: {{ .Values.risingwave.frontend.resources.requests.cpu }}
            memory: {{ .Values.risingwave.frontend.resources.requests.memory }}
          limits:
            cpu: {{ .Values.risingwave.frontend.resources.limits.cpu }}
            memory: {{ .Values.risingwave.frontend.resources.limits.memory }}
        livenessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: postgres
          initialDelaySeconds: 10
          periodSeconds: 5
---
# RisingWave Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.risingwave.name }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.risingwave.name }}
    component: frontend
spec:
  type: {{ .Values.risingwave.frontend.service.type }}
  ports:
  - port: {{ .Values.risingwave.frontend.service.port }}
    targetPort: postgres
    name: postgres
  selector:
    app: {{ .Values.risingwave.name }}
    component: frontend
---
