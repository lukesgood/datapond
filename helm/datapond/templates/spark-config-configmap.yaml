{{- if .Values.spark.enabled }}
---
# spark-defaults.conf — Iceberg + Polaris(REST) + SeaweedFS(S3) so jobs submitted to
# this cluster (Airflow spark-submit, PySpark in JupyterLab) get the lakehouse catalog
# preconfigured. Mounted read-only into /opt/spark/conf on master + worker.
# NOTE: spark.jars.packages resolves from Maven at job-submit time → needs egress.
#       For air-gap, bake the Iceberg/hadoop-aws/awssdk jars into a custom Spark image
#       (separate task) and drop spark.jars.packages.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.spark.name }}-defaults
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
data:
  spark-defaults.conf: |
    spark.master spark://{{ .Values.spark.name }}-master:{{ .Values.spark.master.service.sparkPort }}
    spark.jars.packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4,software.amazon.awssdk:bundle:2.20.18,software.amazon.awssdk:url-connection-client:2.20.18
    spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.iceberg org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.io-impl org.apache.iceberg.aws.s3.S3FileIO
    spark.sql.catalog.iceberg.s3.endpoint http://seaweedfs-s3:8333
    spark.sql.catalog.iceberg.s3.path-style-access true
    {{- if .Values.polaris.enabled }}
    spark.sql.catalog.iceberg.catalog-impl org.apache.iceberg.rest.RESTCatalog
    spark.sql.catalog.iceberg.uri http://{{ .Values.polaris.name }}:{{ .Values.polaris.service.port }}/api/catalog/v1
    spark.sql.catalog.iceberg.warehouse {{ .Values.polaris.storage.defaultBaseLocation }}
    spark.sql.catalog.iceberg.credential {{ .Values.polaris.auth.clientId }}:{{ .Values.polaris.auth.clientSecret }}
    {{- else }}
    spark.sql.catalog.iceberg.type hadoop
    spark.sql.catalog.iceberg.warehouse s3a://iceberg/warehouse
    {{- end }}
    spark.hadoop.fs.s3a.endpoint http://seaweedfs-s3:8333
    spark.hadoop.fs.s3a.path.style.access true
    spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
{{- end }}
