{{- if .Values.trino.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.trino.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.trino.name }}
    app.kubernetes.io/name: {{ .Values.trino.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: analytics
spec:
  replicas: {{ .Values.trino.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.trino.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.trino.name }}
        version: {{ .Values.trino.image.tag }}
    spec:
      serviceAccountName: {{ .Values.trino.serviceAccountName | default "datapond-trino" }}
      containers:
      - name: trino
        image: "{{ .Values.trino.image.repository }}:{{ .Values.trino.image.tag }}"
        imagePullPolicy: {{ .Values.trino.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        {{- if .Values.storage.endpoint }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        {{- end }}
        - name: AWS_REGION
          value: "{{ .Values.storage.region | default "us-east-1" }}"
        {{- if .Values.postgres.enabled }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        {{- end }}
        {{- if .Values.polaris.enabled }}
        - name: POLARIS_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POLARIS_CLIENT_SECRET
        {{- end }}
        volumeMounts:
        - name: trino-config
          mountPath: /etc/trino
        - name: trino-catalog
          mountPath: /etc/trino/catalog
        - name: iceberg-warehouse
          mountPath: /opt/iceberg/warehouse
        {{- if .Values.trino.rls.enabled }}
        # RLS Layer 2: file-based access control rules (backend regenerates this CM)
        - name: trino-acl
          mountPath: /etc/trino/acl
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.trino.resources.requests.cpu }}
            memory: {{ .Values.trino.resources.requests.memory }}
          limits:
            cpu: {{ .Values.trino.resources.limits.cpu }}
            memory: {{ .Values.trino.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /v1/info
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /v1/info
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: trino-config
        configMap:
          name: trino-config
      - name: trino-catalog
        configMap:
          name: trino-catalog
      - name: iceberg-warehouse
        persistentVolumeClaim:
          claimName: iceberg-warehouse-pvc
      {{- if .Values.trino.rls.enabled }}
      - name: trino-acl
        configMap:
          name: {{ .Values.trino.rls.configMapName | default "trino-access-control" }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.trino.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.trino.name }}
spec:
  type: {{ .Values.trino.service.type }}
  ports:
  - port: {{ .Values.trino.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.trino.name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: {{ .Values.namespace }}
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://localhost:8080
    query.max-memory=2GB
    query.max-memory-per-node=1GB
{{- if .Values.trino.rls.enabled }}

  # RLS Layer 2: file-based system access control (row filters + column masks).
  # rules.json lives in the trino-acl ConfigMap; backend regenerates it on policy change.
  access-control.properties: |
    access-control.name=file
    security.config-file=/etc/trino/acl/rules.json
    security.refresh-period={{ .Values.trino.rls.refreshPeriod | default "30s" }}
{{- end }}

  node.properties: |
    node.environment=production
    node.id=trino-node-1
    node.data-dir=/data/trino

  jvm.config: |
    -server
    -Xmx2G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog
  namespace: {{ .Values.namespace }}
data:
  iceberg.properties: |
    connector.name=iceberg
    {{- if .Values.polaris.enabled }}
    # Polaris REST Catalog (Unity Catalog alternative)
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://{{ .Values.polaris.name }}:{{ .Values.polaris.service.port }}/api/catalog
    # Polaris uses the catalog NAME (not the S3 path) as the warehouse identifier
    iceberg.rest-catalog.warehouse={{ .Values.polaris.catalogName | default "iceberg" }}
    iceberg.rest-catalog.security=OAUTH2
    iceberg.rest-catalog.oauth2.credential={{ .Values.polaris.auth.clientId }}:${ENV:POLARIS_CLIENT_SECRET}
    iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
    {{- else if .Values.postgres.enabled }}
    # Fallback: JDBC Catalog (deprecated). With neither polaris nor in-cluster
    # postgres enabled there is no local catalog backend at all.
    iceberg.catalog.type=jdbc
    iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
    iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/iceberg_catalog
    iceberg.jdbc-catalog.connection-user={{ .Values.postgres.auth.username }}
    iceberg.jdbc-catalog.connection-password=${ENV:POSTGRES_PASSWORD}
    {{- end }}
    fs.native-s3.enabled=true
    {{- if .Values.storage.endpoint }}
    s3.endpoint=http://{{ .Values.storage.endpoint }}
    s3.path-style-access=true
    {{- end }}
    s3.region={{ .Values.storage.region | default "us-east-1" }}
  {{- if .Values.postgres.enabled }}

  postgres.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://postgres:5432/datapond
    connection-user={{ .Values.postgres.auth.username }}
    connection-password=${ENV:POSTGRES_PASSWORD}
  {{- end }}
{{- end }}
{{- if .Values.trino.rls.enabled }}
---
# RLS Layer 2: file-based access control rules. Seeded with an allow-all/no-tables
# rule; the backend (POST /api/governance/rls/trino-rules/apply) patches data.rules.json
# from rls_policies/column_masking_policies. Trino auto-reloads per security.refresh-period.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.trino.rls.configMapName | default "trino-access-control" }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.trino.name }}
    app.kubernetes.io/component: trino-rls
data:
  rules.json: |
    {"catalogs":[{"allow":"all"}],"schemas":[{"user":".*","schema":".*","owner":false}],"tables":[]}
{{- end }}
