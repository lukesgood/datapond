{{- if .Values.jupyter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.jupyter.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.jupyter.name }}
spec:
  replicas: {{ .Values.jupyter.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.jupyter.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.jupyter.name }}
    spec:
      initContainers:
      - name: install-extensions
        image: "{{ .Values.jupyter.image.repository }}:{{ .Values.jupyter.image.tag | default .Chart.AppVersion }}"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Installing JupyterLab extensions..."
          {{- if .Values.jupyter.extensions }}
          {{- if .Values.jupyter.extensions.git }}
          pip install --no-cache-dir jupyterlab-git
          {{- end }}
          {{- if .Values.jupyter.extensions.nbdime }}
          pip install --no-cache-dir nbdime
          jupyter labextension enable nbdime-jupyterlab
          {{- end }}
          {{- end }}
          echo "Extensions installed successfully"
        volumeMounts:
        - name: extensions
          mountPath: /opt/conda/share/jupyter/lab/extensions
      containers:
      - name: jupyter
        image: "{{ .Values.jupyter.image.repository }}:{{ .Values.jupyter.image.tag | default .Chart.AppVersion }}"
        ports:
        - containerPort: {{ .Values.jupyter.service.port }}
          name: jupyter
        command:
        - /bin/bash
        - -c
        - |
          set -e
          {{- if .Values.jupyter.extensions }}
          {{- if .Values.jupyter.extensions.git }}
          echo "Installing jupyterlab-git..."
          pip install --no-cache-dir jupyterlab-git
          {{- end }}
          {{- if .Values.jupyter.extensions.nbdime }}
          echo "Installing nbdime..."
          pip install --no-cache-dir nbdime
          jupyter labextension enable nbdime-jupyterlab
          {{- end }}
          {{- end }}
          {{- if .Values.jupyter.gitConfig }}
          echo "Configuring Git defaults..."
          git config --global user.name "{{ .Values.jupyter.gitConfig.defaultUser }}"
          git config --global user.email "{{ .Values.jupyter.gitConfig.defaultEmail }}"
          git config --global init.defaultBranch main
          {{- end }}
          {{- if .Values.jupyter.rlsGuard.enabled }}
          echo "Enabling datapond_lake RLS guard on PYTHONPATH..."
          export PYTHONPATH=/opt/datapond:$PYTHONPATH
          {{- end }}
          echo "Starting JupyterLab..."
          exec start-notebook.sh --NotebookApp.token="${JUPYTER_TOKEN}" --NotebookApp.base_url=/jupyter --NotebookApp.allow_origin='*'
        env:
        - name: JUPYTER_TOKEN
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: JUPYTER_TOKEN
        - name: JUPYTER_ENABLE_LAB
          value: "yes"
        # S3 Configuration (for DuckDB)
        {{- if .Values.storage.endpoint }}
        - name: SEAWEEDFS_S3_ENDPOINT
          value: "http://{{ .Values.storage.endpoint }}"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        {{- end }}
        - name: AWS_REGION
          value: "{{ .Values.storage.region | default "us-east-1" }}"
        # Iceberg Python library
        - name: SPARK_JARS_PACKAGES
          value: "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4"
        {{- range .Values.jupyter.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.jupyter.resources.requests.cpu }}
            memory: {{ .Values.jupyter.resources.requests.memory }}
          limits:
            cpu: {{ .Values.jupyter.resources.limits.cpu }}
            memory: {{ .Values.jupyter.resources.limits.memory }}
        {{- if .Values.jupyter.persistence.enabled }}
        volumeMounts:
        - name: jupyter-data
          mountPath: /home/jovyan/work
        {{- if or .Values.polaris.enabled .Values.trino.enabled }}
        - name: iceberg-warehouse
          mountPath: /opt/iceberg/warehouse
        {{- end }}
        {{- if .Values.jupyter.rlsGuard.enabled }}
        # RLS Layer 3: sanctioned DuckDB helper (blocks direct read of sensitive tables)
        - name: datapond-lake
          mountPath: /opt/datapond
        {{- end }}
        {{- end }}
      {{- if .Values.jupyter.persistence.enabled }}
      volumes:
      - name: jupyter-data
        persistentVolumeClaim:
          claimName: jupyter-pvc
      {{- if or .Values.polaris.enabled .Values.trino.enabled }}
      - name: iceberg-warehouse
        persistentVolumeClaim:
          claimName: iceberg-warehouse-pvc
      {{- end }}
      - name: extensions
        emptyDir: {}
      {{- if .Values.jupyter.rlsGuard.enabled }}
      - name: datapond-lake
        configMap:
          name: datapond-lake-helper
      {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.jupyter.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.jupyter.service.type }}
  ports:
  - port: {{ .Values.jupyter.service.port }}
    targetPort: {{ .Values.jupyter.service.port }}
  selector:
    app: {{ .Values.jupyter.name }}
{{- if .Values.jupyter.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.jupyter.persistence.size }}
{{- end }}
{{- end }}
{{- if .Values.jupyter.rlsGuard.enabled }}
---
# RLS Layer 3: sanctioned DuckDB helper. Mounted at /opt/datapond (on PYTHONPATH) so
# notebooks `import datapond_lake as dp; dp.sql(...)` get sensitive tables blocked from
# direct S3 reads. Soft/UX layer — pair with MinIO bucket policies for the hard boundary.
apiVersion: v1
kind: ConfigMap
metadata:
  name: datapond-lake-helper
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.jupyter.name }}
    app.kubernetes.io/component: jupyter-rls
data:
  datapond_lake.py: |
{{ .Files.Get "files/datapond_lake.py" | indent 4 }}
{{- end }}
