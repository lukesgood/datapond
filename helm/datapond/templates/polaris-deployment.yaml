{{- if .Values.polaris.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.polaris.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.polaris.name }}
    component: catalog
spec:
  replicas: {{ .Values.polaris.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.polaris.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.polaris.name }}
        component: catalog
    spec:
      initContainers:
      - name: wait-for-bootstrap
        image: postgres:16-alpine
        command:
          - sh
          - -c
          - |
            until pg_isready -h {{ .Values.postgres.name }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }}; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
            echo "PostgreSQL ready. Waiting for Polaris schema bootstrap..."
            export PGPASSWORD="$POSTGRES_PASSWORD"
            until psql -h {{ .Values.postgres.name }} -U {{ .Values.postgres.auth.username }} -d {{ .Values.polaris.database }} -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='principal_authentication_data'" | grep -q 1; do
              echo "Waiting for polaris-bootstrap Job to create schema..."
              sleep 3
            done
            echo "Polaris schema present. Starting server."
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD

      containers:
      - name: polaris
        image: {{ .Values.polaris.image.repository }}:{{ .Values.polaris.image.tag }}
        imagePullPolicy: {{ .Values.polaris.image.pullPolicy }}

        ports:
        - name: http
          containerPort: 8181
          protocol: TCP
        - name: admin
          containerPort: 8182
          protocol: TCP

        env:
        # ── Persistence: PostgreSQL via relational-jdbc ───────────
        - name: POLARIS_PERSISTENCE_TYPE
          value: "relational-jdbc"
        - name: POLARIS_PERSISTENCE_RELATIONAL_JDBC_DATABASE_TYPE
          value: "postgresql"

        # ── Quarkus datasource (used by relational-jdbc) ──────────
        - name: QUARKUS_DATASOURCE_DB_KIND
          value: "postgresql"
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: "jdbc:postgresql://{{ .Values.postgres.name }}:{{ .Values.postgres.service.port }}/{{ .Values.polaris.database }}"
        - name: QUARKUS_DATASOURCE_USERNAME
          value: "{{ .Values.postgres.auth.username }}"
        - name: QUARKUS_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD

        # ── Auth: internal token broker, OIDC disabled ────────────
        - name: QUARKUS_OIDC_TENANT_ENABLED
          value: "false"
        - name: POLARIS_AUTHENTICATION_TYPE
          value: "internal"

        # ── Realm context ─────────────────────────────────────────
        - name: POLARIS_REALM_CONTEXT_TYPE
          value: "default"
        - name: POLARIS_REALM_CONTEXT_REALMS
          value: "{{ .Values.polaris.auth.realm | default "default-realm" }}"
        - name: POLARIS_REALM_CONTEXT_REQUIRE_HEADER
          value: "false"

        # ── S3 storage (SeaweedFS) ────────────────────────────────
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        # AWS SDK v2 respects this to redirect S3 traffic to on-prem SeaweedFS
        # instead of the default real AWS endpoint. Force path-style addressing
        # (bucket in URL path, not hostname) since SeaweedFS does not provide
        # DNS for `<bucket>.<endpoint-host>`.
        - name: AWS_ENDPOINT_URL_S3
          value: "http://minio:9000"
        - name: AWS_ENDPOINT_URL
          value: "http://minio:9000"
        - name: AWS_S3_FORCE_PATH_STYLE
          value: "true"
        - name: POLARIS_STORAGE_AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: POLARIS_STORAGE_AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD

        # ── Feature flags ─────────────────────────────────────────
        # Polaris feature keys are quoted in properties form (e.g. polaris.features."KEY"=val).
        # The env-var convention lowercases and splits on underscores, so we pass the
        # uppercase-preserving properties through JAVA_OPTS_APPEND as -D system properties.
        - name: JAVA_OPTS_APPEND
          value: >-
            -Dpolaris.readiness.ignore-severe-issues=true
            -Dpolaris.features."ENFORCE_PRINCIPAL_CREDENTIAL_ROTATION_REQUIRED_CHECKING"=false
            -Dpolaris.features."DROP_WITH_PURGE_ENABLED"=true
            -Dpolaris.features."ALLOW_SPECIFYING_FILE_IO_IMPL"=true
            -Dpolaris.features."ALLOW_INSECURE_STORAGE_TYPES"=true
            -Dpolaris.features."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION"=true
            -Dpolaris.features."ALLOW_EXTERNAL_CATALOG_CREDENTIAL_VENDING"=false
            -Dpolaris.features."SUPPORTED_CATALOG_STORAGE_TYPES"=["S3","GCS","AZURE","FILE"]
            -Daws.s3UseArnRegion=false
            -Dsoftware.amazon.awssdk.http.service.impl=software.amazon.awssdk.http.apache.ApacheSdkHttpService

        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8182
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8182
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: {{ .Values.polaris.resources.requests.cpu }}
            memory: {{ .Values.polaris.resources.requests.memory }}
          limits:
            cpu: {{ .Values.polaris.resources.limits.cpu }}
            memory: {{ .Values.polaris.resources.limits.memory }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.polaris.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.polaris.name }}
spec:
  type: {{ .Values.polaris.service.type }}
  ports:
  - name: http
    port: {{ .Values.polaris.service.port }}
    targetPort: 8181
    protocol: TCP
  - name: admin
    port: 8182
    targetPort: 8182
    protocol: TCP
  selector:
    app: {{ .Values.polaris.name }}

---
apiVersion: v1
kind: Secret
metadata:
  name: polaris-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  clientId: {{ .Values.polaris.auth.clientId | quote }}
  clientSecret: {{ .Values.polaris.auth.clientSecret | quote }}
  realm: {{ .Values.polaris.auth.realm | default "default-realm" | quote }}

{{- end }}
