{{- if .Values.seaweedfs.enabled }}
---
# SeaweedFS Master
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.seaweedfs.name }}-master
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.seaweedfs.name }}
    component: master
spec:
  serviceName: {{ .Values.seaweedfs.name }}-master
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.seaweedfs.name }}
      component: master
  template:
    metadata:
      labels:
        app: {{ .Values.seaweedfs.name }}
        component: master
    spec:
      containers:
      - name: master
        image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
        command:
        - /usr/bin/weed
        - master
        - -ip=$(POD_IP)
        - -port=9333
        # Persist master metadata on the PVC (/data). Without -mdir it defaults to
        # /tmp (ephemeral) → volume topology lost on every pod restart.
        - -mdir=/data
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 9333
          name: master
        - containerPort: 19333
          name: master-grpc
        resources:
          requests:
            cpu: {{ .Values.seaweedfs.master.resources.requests.cpu }}
            memory: {{ .Values.seaweedfs.master.resources.requests.memory }}
          limits:
            cpu: {{ .Values.seaweedfs.master.resources.limits.cpu }}
            memory: {{ .Values.seaweedfs.master.resources.limits.memory }}
        {{- if .Values.seaweedfs.persistence.enabled }}
        volumeMounts:
        - name: master-data
          mountPath: /data
        {{- end }}
        livenessProbe:
          httpGet:
            path: /cluster/status
            port: 9333
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /cluster/status
            port: 9333
          initialDelaySeconds: 10
          periodSeconds: 5
  {{- if .Values.seaweedfs.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: master-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.global.storageClass }}
      resources:
        requests:
          storage: {{ .Values.seaweedfs.master.persistence.size }}
  {{- end }}
---
# SeaweedFS Master Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.seaweedfs.name }}-master
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  ports:
  - port: 9333
    targetPort: 9333
    name: master
  - port: 19333
    targetPort: 19333
    name: master-grpc
  selector:
    app: {{ .Values.seaweedfs.name }}
    component: master
---
# SeaweedFS Volume Server
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.seaweedfs.name }}-volume
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.seaweedfs.name }}
    component: volume
spec:
  serviceName: {{ .Values.seaweedfs.name }}-volume
  replicas: {{ .Values.seaweedfs.volume.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.seaweedfs.name }}
      component: volume
  template:
    metadata:
      labels:
        app: {{ .Values.seaweedfs.name }}
        component: volume
    spec:
      initContainers:
      - name: wait-for-master
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z {{ .Values.seaweedfs.name }}-master 9333; do
            echo "Waiting for seaweedfs-master:9333..."
            sleep 3
          done
          echo "Master is ready"
      containers:
      - name: volume
        image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
        command:
        - /usr/bin/weed
        - volume
        - -mserver={{ .Values.seaweedfs.name }}-master:9333
        - -port=8080
        - -ip=$(POD_IP)
        - -max=100
        - -dataCenter=dc1
        # Persist volume data on the PVC (/data). Without -dir it defaults to /tmp
        # (ephemeral) → ALL stored objects (Iceberg data/metadata) lost on restart.
        - -dir=/data
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8080
          name: volume
        - containerPort: 18080
          name: volume-grpc
        resources:
          requests:
            cpu: {{ .Values.seaweedfs.volume.resources.requests.cpu }}
            memory: {{ .Values.seaweedfs.volume.resources.requests.memory }}
          limits:
            cpu: {{ .Values.seaweedfs.volume.resources.limits.cpu }}
            memory: {{ .Values.seaweedfs.volume.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        {{- if .Values.seaweedfs.persistence.enabled }}
        volumeMounts:
        - name: volume-data
          mountPath: /data
        {{- end }}
  {{- if .Values.seaweedfs.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: volume-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.global.storageClass }}
      resources:
        requests:
          storage: {{ .Values.seaweedfs.volume.persistence.size }}
  {{- end }}
---
# SeaweedFS Volume Service (Headless)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.seaweedfs.name }}-volume
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  ports:
  - port: 8080
    targetPort: 8080
    name: volume
  - port: 18080
    targetPort: 18080
    name: volume-grpc
  selector:
    app: {{ .Values.seaweedfs.name }}
    component: volume
---
# SeaweedFS Filer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.seaweedfs.name }}-filer
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.seaweedfs.name }}
    component: filer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.seaweedfs.name }}
      component: filer
  template:
    metadata:
      labels:
        app: {{ .Values.seaweedfs.name }}
        component: filer
    spec:
      initContainers:
      - name: wait-for-master
        image: busybox:1.36
        command: ["sh","-c","until nc -z {{ .Values.seaweedfs.name }}-master 9333; do echo waiting; sleep 3; done"]
      containers:
      - name: filer
        image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
        command:
        - /usr/bin/weed
        - filer
        - -master={{ .Values.seaweedfs.name }}-master:9333
        - -ip=$(POD_IP)
        # Persist the filer store (path→fileid mapping) on the PVC (/data). Without
        # this the default leveldb store sits under /tmp → S3 object mappings lost on
        # restart (objects become unfindable even if volume data survived).
        - -defaultStoreDir=/data
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 8888
          name: filer
        - containerPort: 18888
          name: filer-grpc
        resources:
          requests:
            cpu: {{ .Values.seaweedfs.filer.resources.requests.cpu }}
            memory: {{ .Values.seaweedfs.filer.resources.requests.memory }}
          limits:
            cpu: {{ .Values.seaweedfs.filer.resources.limits.cpu }}
            memory: {{ .Values.seaweedfs.filer.resources.limits.memory }}
        {{- if .Values.seaweedfs.persistence.enabled }}
        volumeMounts:
        - name: filer-data
          mountPath: /data
        {{- end }}
      {{- if .Values.seaweedfs.persistence.enabled }}
      volumes:
      - name: filer-data
        persistentVolumeClaim:
          claimName: seaweedfs-filer-pvc
      {{- end }}
---
# SeaweedFS Filer Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.seaweedfs.name }}-filer
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: 8888
    targetPort: 8888
    name: filer
  - port: 18888
    targetPort: 18888
    name: filer-grpc
  selector:
    app: {{ .Values.seaweedfs.name }}
    component: filer
{{- if .Values.seaweedfs.persistence.enabled }}
---
# Filer PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-filer-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.seaweedfs.filer.persistence.size }}
{{- end }}
---
# SeaweedFS S3 identity/credential config.
# The standalone `weed s3` binary ignores WEED_S3_DEFAULT_USER/PWD — those envs only
# affect `weed server -s3`. To accept AWS SigV4 signed requests (which Trino/Polaris
# always send when AWS_ACCESS_KEY_ID is set), we must pass `-config=<path>.json`.
# A single identity with Admin permissions is sufficient for on-prem Iceberg use.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.seaweedfs.name }}-s3-config
  namespace: {{ .Values.namespace }}
data:
  s3.json: |
    {
      "identities": [
        {
          "name": "{{ .Values.seaweedfs.auth.s3User }}",
          "credentials": [
            {
              "accessKey": "{{ .Values.seaweedfs.auth.s3User }}",
              "secretKey": "{{ .Values.seaweedfs.auth.s3Password }}"
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
# SeaweedFS S3 Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.seaweedfs.name }}-s3
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.seaweedfs.name }}
    component: s3
spec:
  replicas: {{ .Values.seaweedfs.s3.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.seaweedfs.name }}
      component: s3
  template:
    metadata:
      labels:
        app: {{ .Values.seaweedfs.name }}
        component: s3
      annotations:
        # Force pod rollout when the identity/credential pair in values.yaml changes
        checksum/s3-config: {{ printf "%s:%s" .Values.seaweedfs.auth.s3User .Values.seaweedfs.auth.s3Password | sha256sum | trunc 16 }}
    spec:
      initContainers:
      - name: wait-for-filer
        image: busybox:1.36
        command: ["sh","-c","until nc -z {{ .Values.seaweedfs.name }}-filer 8888; do echo waiting; sleep 3; done"]
      containers:
      - name: s3
        image: "{{ .Values.seaweedfs.image.repository }}:{{ .Values.seaweedfs.image.tag }}"
        command:
        - /usr/bin/weed
        - s3
        - -filer={{ .Values.seaweedfs.name }}-filer:8888
        - -port=8333
        - -config=/etc/seaweedfs/s3.json
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: s3-config
          mountPath: /etc/seaweedfs
          readOnly: true
        ports:
        - containerPort: 8333
          name: s3
        resources:
          requests:
            cpu: {{ .Values.seaweedfs.s3.resources.requests.cpu }}
            memory: {{ .Values.seaweedfs.s3.resources.requests.memory }}
          limits:
            cpu: {{ .Values.seaweedfs.s3.resources.limits.cpu }}
            memory: {{ .Values.seaweedfs.s3.resources.limits.memory }}
        # With IAM auth enabled, GET / returns 403 for anonymous requests, so HTTP
        # probes fail. Use TCP socket probes — they only verify the port is open.
        livenessProbe:
          tcpSocket:
            port: 8333
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8333
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: s3-config
        configMap:
          name: {{ .Values.seaweedfs.name }}-s3-config
---
# SeaweedFS S3 Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.seaweedfs.name }}-s3
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.seaweedfs.s3.service.type }}
  {{- if .Values.seaweedfs.s3.clusterIP }}
  # Pin ClusterIP so the CoreDNS virtual-host A-record override stays valid
  # across re-installs (see coredns-custom-configmap.yaml).
  clusterIP: {{ .Values.seaweedfs.s3.clusterIP }}
  {{- end }}
  ports:
  - port: {{ .Values.seaweedfs.s3.service.port }}
    targetPort: 8333
    name: s3
  selector:
    app: {{ .Values.seaweedfs.name }}
    component: s3
{{- end }}
