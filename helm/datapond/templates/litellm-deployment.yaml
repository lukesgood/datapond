{{- if .Values.litellm.enabled }}
---
# LiteLLM ConfigMap — model routing config mounted as /app/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
data:
  config.yaml: |
    model_list:
    {{- range .Values.litellm.config.model_list }}
      - model_name: {{ .model_name | quote }}
        litellm_params:
          model: {{ .litellm_params.model | quote }}
          {{- if .litellm_params.api_base }}
          api_base: {{ .litellm_params.api_base | quote }}
          {{- end }}
          {{- if .litellm_params.aws_region_name }}
          aws_region_name: {{ .litellm_params.aws_region_name | quote }}
          {{- end }}
    {{- end }}
---
# LiteLLM Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.litellm.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
    app.kubernetes.io/name: {{ .Values.litellm.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ai-proxy
spec:
  replicas: {{ .Values.litellm.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.litellm.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.litellm.name }}
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ .Values.litellm.config | toYaml | sha256sum }}
    spec:
      containers:
      - name: litellm
        image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
        imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
        command:
          - litellm
          - --config
          - /app/config.yaml
          - --port
          - "4000"
          - --host
          - "0.0.0.0"
        ports:
        - containerPort: {{ .Values.litellm.service.port }}
          name: http
          protocol: TCP
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        resources:
          requests:
            cpu: {{ .Values.litellm.resources.requests.cpu }}
            memory: {{ .Values.litellm.resources.requests.memory }}
          limits:
            cpu: {{ .Values.litellm.resources.limits.cpu }}
            memory: {{ .Values.litellm.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.litellm.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.litellm.service.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
---
# LiteLLM Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.litellm.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
  - port: {{ .Values.litellm.service.port }}
    targetPort: {{ .Values.litellm.service.port }}
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.litellm.name }}
{{- end }}
