{{- if .Values.litellm.enabled }}
{{- $dbMode := or .Values.postgres.enabled .Values.litellm.databaseUrl }}
---
# LiteLLM ConfigMap — bootstrap config mounted as /app/config.yaml.
# In DB mode (store_model_in_db) the real model_list lives in PostgreSQL and is
# managed at runtime via the admin API; this file only seeds optional models +
# general/litellm settings.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
data:
  config.yaml: |
    model_list:{{- if not .Values.litellm.config.model_list }} []{{- end }}
    {{- range .Values.litellm.config.model_list }}
      - model_name: {{ .model_name | quote }}
        litellm_params:
          model: {{ .litellm_params.model | quote }}
          {{- if .litellm_params.api_base }}
          api_base: {{ .litellm_params.api_base | quote }}
          {{- end }}
          {{- if .litellm_params.aws_region_name }}
          aws_region_name: {{ .litellm_params.aws_region_name | quote }}
          {{- end }}
    {{- end }}
    {{- if $dbMode }}
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
    {{- end }}
    litellm_settings:
      drop_params: true
      telemetry: false
      {{- if and .Values.litellm.cache .Values.valkey.enabled }}
      # Response caching → Valkey (Redis-compatible) for cost/latency reduction
      cache: true
      cache_params:
        type: redis
        host: {{ .Values.valkey.name | default "valkey" }}.{{ .Values.namespace }}.svc.cluster.local
        port: {{ .Values.valkey.service.port | default 6379 }}
        ttl: 3600
      {{- end }}
      {{- if .Values.litellm.metrics }}
      # Prometheus metrics at /metrics (request count, latency, tokens, spend)
      callbacks: ["prometheus"]
      {{- end }}
    # Global reliability defaults (apply to DB-managed models too)
    router_settings:
      num_retries: 2
      timeout: 60
    {{- with .Values.litellm.guardrails }}
    # Gateway guardrails applied to ALL LLM traffic (RAG/chat/sql), environment-
    # configurable. Set litellm.guardrails in values to enable — e.g. Presidio PII
    # (needs presidio-analyzer/anonymizer services) or a prompt-injection provider.
    guardrails:
{{ toYaml . | indent 6 }}
    {{- end }}
---
# LiteLLM Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.litellm.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
    app.kubernetes.io/name: {{ .Values.litellm.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ai-gateway
spec:
  replicas: {{ .Values.litellm.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.litellm.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.litellm.name }}
      annotations:
        # Force pod restart when bootstrap config changes
        checksum/config: {{ .Values.litellm.config | toYaml | sha256sum }}
    spec:
      {{- if .Values.postgres.enabled }}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        command:
          - sh
          - -c
          - |
            until pg_isready -h {{ .Values.postgres.name | default "postgres" }} -p {{ .Values.postgres.service.port | default 5432 }} -U {{ .Values.postgres.auth.username | default "datapond" }}; do
              echo "Waiting for PostgreSQL..."
              sleep 2
            done
            # Ensure the litellm DB exists. postgres-init only runs on first PG boot,
            # so on pre-existing clusters this is the only thing that creates it.
            psql -h {{ .Values.postgres.name | default "postgres" }} -p {{ .Values.postgres.service.port | default 5432 }} -U {{ .Values.postgres.auth.username | default "datapond" }} -d postgres -tAc \
              "SELECT 1 FROM pg_database WHERE datname='{{ .Values.litellm.database | default "litellm" }}'" | grep -q 1 || \
              psql -h {{ .Values.postgres.name | default "postgres" }} -p {{ .Values.postgres.service.port | default 5432 }} -U {{ .Values.postgres.auth.username | default "datapond" }} -d postgres \
              -c "CREATE DATABASE {{ .Values.litellm.database | default "litellm" }}"
            echo "PostgreSQL ready; litellm DB ensured."
      {{- end }}
      containers:
      - name: litellm
        image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
        imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
        command:
          - litellm
          - --config
          - /app/config.yaml
          - --port
          - "4000"
          - --host
          - "0.0.0.0"
        ports:
        - containerPort: {{ .Values.litellm.service.port }}
          name: http
          protocol: TCP
        env:
        # Gateway auth (admin API + virtual keys) and credential encryption salt.
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: LITELLM_MASTER_KEY
        - name: LITELLM_SALT_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: LITELLM_SALT_KEY
        {{- if $dbMode }}
        # DB mode — persist model_list / keys / spend in PostgreSQL for runtime config.
        - name: STORE_MODEL_IN_DB
          value: "True"
        {{- if .Values.litellm.databaseUrl }}
        - name: DATABASE_URL
          value: {{ .Values.litellm.databaseUrl | quote }}
        {{- else }}
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ .Values.postgres.name | default "postgres" }}:{{ .Values.postgres.service.port | default 5432 }}/{{ .Values.litellm.database | default "litellm" }}"
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        resources:
          requests:
            cpu: {{ .Values.litellm.resources.requests.cpu }}
            memory: {{ .Values.litellm.resources.requests.memory }}
          limits:
            cpu: {{ .Values.litellm.resources.limits.cpu }}
            memory: {{ .Values.litellm.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: {{ .Values.litellm.service.port }}
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: {{ .Values.litellm.service.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
---
# LiteLLM Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.litellm.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
spec:
  type: {{ .Values.litellm.service.type }}
  ports:
  - port: {{ .Values.litellm.service.port }}
    targetPort: {{ .Values.litellm.service.port }}
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.litellm.name }}
{{- end }}
