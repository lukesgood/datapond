{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.valkey.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.valkey.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.valkey.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.valkey.name }}
      annotations:
        description: "Valkey (Redis-compatible) - BSD 3-Clause License"
    spec:
      containers:
      - name: valkey
        image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
        ports:
        - containerPort: {{ .Values.valkey.service.port }}
          name: valkey
        resources:
          requests:
            cpu: {{ .Values.valkey.resources.requests.cpu }}
            memory: {{ .Values.valkey.resources.requests.memory }}
          limits:
            cpu: {{ .Values.valkey.resources.limits.cpu }}
            memory: {{ .Values.valkey.resources.limits.memory }}
        {{- if .Values.valkey.persistence.enabled }}
        volumeMounts:
        - name: valkey-data
          mountPath: /data
        {{- end }}
        # timeoutSeconds/failureThreshold set explicitly (defaults are 1s/3): the exec
        # `valkey-cli ping` can exceed 1s under transient node load (e.g. heavy image
        # builds) on the single node, and 3 quick failures then SIGKILL the container —
        # spurious restarts of a healthy Valkey (uses ~15Mi, no crash logs). Loosen so
        # only sustained unresponsiveness restarts it.
        livenessProbe:
          exec:
            command:
            - valkey-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          exec:
            command:
            - valkey-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      {{- if .Values.valkey.persistence.enabled }}
      volumes:
      - name: valkey-data
        persistentVolumeClaim:
          claimName: valkey-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.valkey.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.valkey.name }}
spec:
  ports:
  - port: {{ .Values.valkey.service.port }}
    targetPort: {{ .Values.valkey.service.port }}
    name: valkey
  selector:
    app: {{ .Values.valkey.name }}
  type: ClusterIP
---
# Redis 호환성을 위한 서비스 별칭
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.valkey.name }}
  annotations:
    description: "Compatibility alias for Valkey (points to valkey service)"
spec:
  ports:
  - port: 6379
    targetPort: {{ .Values.valkey.service.port }}
    name: redis
  selector:
    app: {{ .Values.valkey.name }}
  type: ClusterIP
{{- if .Values.valkey.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size }}
{{- end }}
{{- end }}
