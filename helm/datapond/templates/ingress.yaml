{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datapond-ingress
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: datapond
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- $ingressHost := .Values.ingress.domain | default .Values.global.domain }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ $ingressHost }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ $ingressHost }}
    http:
      paths:
      # Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.name }}
            port:
              number: {{ .Values.frontend.service.port }}

      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.backend.name }}
            port:
              number: {{ .Values.backend.service.port }}

      {{- if .Values.jupyter.enabled }}
      # JupyterLab
      - path: /jupyter
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.jupyter.name }}
            port:
              number: {{ .Values.jupyter.service.port }}
      {{- end }}

      {{- if .Values.mlflow.enabled }}
      # MLflow
      - path: /mlflow
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.mlflow.name }}
            port:
              number: {{ .Values.mlflow.service.port }}
      {{- end }}

      {{- if .Values.airflow.enabled }}
      # Airflow
      - path: /airflow
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.airflow.name }}
            port:
              number: {{ .Values.airflow.webserver.service.port }}
      {{- end }}

      {{- if .Values.spark.enabled }}
      # Spark UI
      - path: /spark
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.spark.name }}-master
            port:
              number: {{ .Values.spark.master.service.webPort }}
      {{- end }}

      {{- if .Values.seaweedfs.enabled }}
      # SeaweedFS Filer (Web UI)
      - path: /seaweedfs
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.seaweedfs.name }}-filer
            port:
              number: 8888
      {{- end }}

      {{- if .Values.trino.enabled }}
      # Trino (SQL Analytics)
      - path: /trino
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.trino.name }}
            port:
              number: {{ .Values.trino.service.port }}
      {{- end }}

      {{- if .Values.risingwave.enabled }}
      # RisingWave Dashboard
      - path: /risingwave
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.risingwave.name }}-meta
            port:
              number: {{ .Values.risingwave.meta.service.dashboardPort }}
      {{- end }}

      {{- if .Values.openmetadata.enabled }}
      # OpenMetadata
      - path: /openmetadata
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.openmetadata.name }}-server
            port:
              number: {{ .Values.openmetadata.server.service.port }}
      {{- end }}
{{- end }}
