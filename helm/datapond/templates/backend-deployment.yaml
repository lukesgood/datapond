{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.backend.name }}
    app.kubernetes.io/name: {{ .Values.backend.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
        version: {{ .Values.backend.image.tag | default .Chart.AppVersion }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.backend.serviceAccountName | default "datapond-backend" }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.service.targetPort }}
          name: http
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_DB
        - name: POSTGRES_HOST
          value: "{{ if .Values.externalDatabase.enabled }}{{ .Values.externalDatabase.host }}{{ else }}postgres{{ end }}"
        - name: POSTGRES_PORT
          value: "{{ if .Values.externalDatabase.enabled }}{{ .Values.externalDatabase.port | default 5432 }}{{ else }}5432{{ end }}"
        {{- if .Values.externalDatabase.enabled }}
        - name: POSTGRES_SSLMODE
          value: "{{ .Values.externalDatabase.sslmode | default "require" }}"
        {{- end }}
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: S3_ENDPOINT
          value: "{{ .Values.storage.endpoint | default "" }}"
        - name: S3_REGION
          value: "{{ .Values.storage.region | default "us-east-1" }}"
        {{- if .Values.storage.endpoint }}
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        {{- end }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRE_HOURS
          value: {{ (.Values.auth | default dict).tokenExpireHours | default 24 | quote }}
        # Shared key for trusted in-cluster automation (scheduled DAGs → /ingest-source)
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: INTERNAL_API_KEY
        # RAG freshness scheduler (Airflow-free periodic re-embedding).
        # Use `dig` (key-existence), NOT `| default true` — sprig's `default`
        # treats a bool `false` as empty, so `false | default true` renders
        # "true" and the off-switch silently does nothing.
        - name: RAG_SCHEDULER_ENABLED
          value: {{ dig "enabled" true (.Values.backend.ragScheduler | default dict) | quote }}
        - name: RAG_SCHEDULER_TICK_SECONDS
          value: {{ dig "tickSeconds" 300 (.Values.backend.ragScheduler | default dict) | quote }}
        # Connector → RAG sink: re-embed fresh collections when their source table syncs
        - name: RAG_SINK_ENABLED
          value: {{ dig "sinkEnabled" true (.Values.backend.ragScheduler | default dict) | quote }}
        # AWS-native observability: emit ops + cost metrics to CloudWatch (namespace DataPond).
        # Default off — needs cloudwatch:PutMetricData on the node/IRSA role.
        - name: CLOUDWATCH_METRICS_ENABLED
          value: {{ dig "enabled" false (.Values.backend.cloudwatchMetrics | default dict) | quote }}
        - name: CLOUDWATCH_METRICS_NAMESPACE
          value: {{ dig "namespace" "DataPond" (.Values.backend.cloudwatchMetrics | default dict) | quote }}
        # Encrypts credentials-at-rest (connector secrets, stored provider keys)
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: ENCRYPTION_KEY
        # Initial admin login password (generated/preserved — see secrets.yaml)
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: ADMIN_PASSWORD
        # Iceberg catalog connection
        - name: ICEBERG_CATALOG_URI
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/iceberg_catalog"
        - name: ICEBERG_WAREHOUSE
          value: "s3a://iceberg/warehouse"
        {{- if .Values.polaris.enabled }}
        # Polaris REST catalog — PyIceberg 직접 쓰기용 (Trino iceberg.properties와 동일 자격)
        - name: POLARIS_URI
          value: "http://{{ .Values.polaris.name }}.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.polaris.service.port }}/api/catalog"
        - name: POLARIS_WAREHOUSE
          value: "{{ .Values.polaris.catalogName | default "iceberg" }}"
        - name: POLARIS_CLIENT_ID
          value: "{{ .Values.polaris.auth.clientId }}"
        - name: POLARIS_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POLARIS_CLIENT_SECRET
        {{- end }}
        # Iceberg 유지보수 DAG 설정 (P0-3)
        - name: DATAPOND_MAINTENANCE_SCHEDULE
          value: "{{ .Values.maintenance.schedule | default "0 3 * * *" }}"
        - name: DATAPOND_MAINTENANCE_FILE_SIZE
          value: "{{ .Values.maintenance.fileSize | default "128MB" }}"
        - name: DATAPOND_MAINTENANCE_SNAPSHOT_RETENTION
          value: "{{ .Values.maintenance.snapshotRetention | default "7d" }}"
        - name: DATAPOND_MAINTENANCE_ORPHAN_RETENTION
          value: "{{ .Values.maintenance.orphanRetention | default "7d" }}"
        # Airflow integration - BASE_URL is /airflow so API is at /airflow/api/v1
        - name: AIRFLOW_API_URL
          value: "http://airflow.{{ .Values.namespace }}.svc.cluster.local:8080/airflow/api/v1"
        - name: AIRFLOW_USERNAME
          value: "{{ .Values.airflow.auth.username }}"
        - name: AIRFLOW_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: AIRFLOW_PASSWORD
              optional: true
        - name: JUPYTER_TOKEN
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: JUPYTER_TOKEN
              optional: true
        - name: AIRFLOW_DAGS_PATH
          value: "/opt/airflow/dags"
        # AI gateway configuration.
        # litellm 활성 시 co-located 게이트웨이(단일 진입점)를, 아니면 ai.llmEndpoint(외부 OpenAI 호환)를 가리킴.
        # 둘 다 없으면 빈 값 → AI 비활성(템플릿 폴백, 불필요한 타임아웃 없음).
        - name: LITELLM_URL
          value: "{{ if .Values.litellm.enabled }}http://{{ .Values.litellm.name }}.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.litellm.service.port }}{{ else }}{{ .Values.ai.llmEndpoint }}{{ end }}"
        - name: LITELLM_MODEL
          value: "{{ .Values.ai.llmModel | default "default" }}"
        # Korean PII guardrail mode (mask | block | off)
        - name: PII_GUARDRAIL_MODE
          value: "{{ .Values.ai.piiGuardrail | default "mask" }}"
        # AI egress policy (local-only | cloud-allowed) — sovereign deployments
        # set local-only to block external LLM providers (no data egress).
        - name: AI_EGRESS_POLICY
          value: "{{ .Values.ai.egressPolicy | default "cloud-allowed" }}"
        # Vector store / RAG (pgvector) — embedding model_name + output dimension.
        - name: AI_EMBED_MODEL
          value: "{{ .Values.ai.embedModel | default "embed" }}"
        - name: AI_EMBED_DIM
          value: "{{ .Values.ai.embedDim | default 1024 }}"
        {{- with .Values.ai.rerankModel }}
        # Optional RAG reranker (LiteLLM model_name, e.g. bedrock/amazon.rerank-v1:0).
        # Empty = vector-similarity order only.
        - name: AI_RERANK_MODEL
          value: {{ . | quote }}
        {{- end }}
        # Feature flags for UI capability-gating — the frontend hides nav items
        # whose backend component is disabled. Default true (unset ⇒ shown).
        - name: FEATURE_TRINO
          value: "{{ dig "enabled" true .Values.trino }}"
        - name: FEATURE_POLARIS
          value: "{{ dig "enabled" true .Values.polaris }}"
        - name: FEATURE_AIRFLOW
          value: "{{ dig "enabled" true .Values.airflow }}"
        - name: FEATURE_MLFLOW
          value: "{{ dig "enabled" true .Values.mlflow }}"
        - name: FEATURE_RISINGWAVE
          value: "{{ dig "enabled" true .Values.risingwave }}"
        - name: FEATURE_OPENMETADATA
          value: "{{ dig "enabled" true .Values.openmetadata }}"
        - name: FEATURE_JUPYTER
          value: "{{ dig "enabled" true .Values.jupyter }}"
        # Glue is the AWS-native catalog backend — capability derives from catalog.backend
        # (single source of truth) so the flag can't drift from the actual backend.
        - name: FEATURE_GLUE
          value: "{{ if eq ((.Values.catalog | default dict).backend | default "polaris") "glue" }}true{{ else }}false{{ end }}"
        - name: ICEBERG_CATALOG_BACKEND
          value: {{ (.Values.catalog | default dict).backend | default "polaris" | quote }}
        - name: GLUE_WAREHOUSE
          value: {{ (.Values.catalog | default dict).glueWarehouse | default "" | quote }}
        # Query engine (slice 2): Athena on the glue profile, else Trino. Derived from catalog.backend.
        - name: FEATURE_ATHENA
          value: "{{ if eq ((.Values.catalog | default dict).backend | default "polaris") "glue" }}true{{ else }}false{{ end }}"
        - name: QUERY_ENGINE
          value: "{{ if eq ((.Values.catalog | default dict).backend | default "polaris") "glue" }}athena{{ else }}trino{{ end }}"
        - name: RLS_DEFAULT_CATALOG
          value: "{{ if eq ((.Values.catalog | default dict).backend | default "polaris") "glue" }}AwsDataCatalog{{ else }}iceberg{{ end }}"
        # RLS (Layer 1) policy enforcement gate — off by default (dark) until governance.rls.enabled
        # is set. See docs/RLS_DESIGN.md. Use `dig` (bool-false safe — see RAG_SCHEDULER note above).
        - name: RLS_ENABLED
          value: {{ dig "enabled" false ((.Values.governance | default dict).rls | default dict) | quote }}
        # Opt-in strict mode: when false (default), a referenced table with no RLS policy
        # passes through unfiltered (no-op on a policy-empty DB); true restores strict
        # default_deny (blocks any unregistered table). See backend/app/rls/engine.py.
        - name: RLS_DEFAULT_DENY
          value: {{ dig "defaultDeny" false ((.Values.governance | default dict).rls | default dict) | quote }}
        - name: ATHENA_OUTPUT_LOCATION
          value: {{ (.Values.catalog | default dict).athenaOutputLocation | default "" | quote }}
        - name: ATHENA_WORKGROUP
          value: {{ (.Values.catalog | default dict).athenaWorkgroup | default "primary" | quote }}
        - name: ATHENA_DATABASE
          value: {{ (.Values.catalog | default dict).athenaDatabase | default "default" | quote }}
        {{- if (((.Values.auth).ldap).enabled) }}
        # LDAP / Active Directory authentication
        - name: LDAP_ENABLED
          value: "true"
        - name: LDAP_URL
          value: "{{ .Values.auth.ldap.url }}"
        - name: LDAP_BIND_DN
          value: "{{ .Values.auth.ldap.bindDN }}"
        - name: LDAP_BIND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: LDAP_BIND_PASSWORD
              optional: true
        - name: LDAP_USER_BASE
          value: "{{ .Values.auth.ldap.userBase }}"
        - name: LDAP_USER_FILTER
          value: {{ .Values.auth.ldap.userFilter | default "(uid={username})" | quote }}
        - name: LDAP_USER_DN_TEMPLATE
          value: {{ .Values.auth.ldap.dnTemplate | default "" | quote }}
        - name: LDAP_ATTR_EMAIL
          value: "{{ .Values.auth.ldap.attrEmail | default "mail" }}"
        - name: LDAP_ATTR_NAME
          value: "{{ .Values.auth.ldap.attrName | default "cn" }}"
        - name: LDAP_DEFAULT_ROLE
          value: "{{ .Values.auth.ldap.defaultRole | default "viewer" }}"
        - name: LDAP_ADMIN_GROUP
          value: "{{ .Values.auth.ldap.adminGroup | default "" }}"
        {{- end }}
        {{- if (((.Values.auth).oidc).enabled) }}
        # OIDC SSO (Enterprise /ee feature)
        - name: OIDC_ENABLED
          value: "true"
        - name: OIDC_ISSUER
          value: "{{ .Values.auth.oidc.issuer }}"
        - name: OIDC_CLIENT_ID
          value: "{{ .Values.auth.oidc.clientId }}"
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: OIDC_CLIENT_SECRET
              optional: true
        - name: OIDC_SCOPES
          value: {{ .Values.auth.oidc.scopes | default "openid profile email" | quote }}
        - name: OIDC_REDIRECT_URL
          value: "{{ .Values.auth.oidc.redirectUrl | default (printf "%s://%s/api/auth/oidc/callback" (.Values.global.externalScheme | default "http") (.Values.ingress.domain | default .Values.global.domain)) }}"
        - name: OIDC_GROUP_CLAIM
          value: "{{ .Values.auth.oidc.groupClaim | default "groups" }}"
        - name: OIDC_ADMIN_GROUP
          value: "{{ .Values.auth.oidc.adminGroup | default "" }}"
        - name: OIDC_DEFAULT_ROLE
          value: "{{ .Values.auth.oidc.defaultRole | default "viewer" }}"
        {{- end }}
        # Passkey / WebAuthn — always injected; backend self-gates on HTTPS + config.
        - name: WEBAUTHN_RP_ID
          value: "{{ .Values.auth.webauthn.rpId | default .Values.ingress.domain | default .Values.global.domain }}"
        - name: WEBAUTHN_ORIGIN
          value: "{{ .Values.auth.webauthn.origin | default (printf "%s://%s" (.Values.global.externalScheme | default "http") (.Values.ingress.domain | default .Values.global.domain)) }}"
        - name: WEBAUTHN_RP_NAME
          value: "{{ .Values.auth.webauthn.rpName | default "DataPond" }}"
        {{- if .Values.litellm.enabled }}
        # Master key — authenticates the backend to the LiteLLM admin API
        # (manage/switch model backends at runtime) and to /v1/chat/completions.
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: LITELLM_MASTER_KEY
        {{- end }}
        - name: OPENMETADATA_URL
          value: "http://openmetadata-server.{{ .Values.namespace }}.svc.cluster.local:8585"
        # OM ingestion-bot JWT for service auth (optional — set via openmetadata.jwtToken)
        - name: OPENMETADATA_JWT_TOKEN
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: OPENMETADATA_JWT_TOKEN
              optional: true
        # OM basic-auth fallback creds (used only when JWT token unset) — overridable
        - name: OPENMETADATA_EMAIL
          value: "{{ .Values.openmetadata.email | default "admin@open-metadata.org" }}"
        - name: OPENMETADATA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: OPENMETADATA_PASSWORD
              optional: true
        {{- if .Values.backend.env }}
        {{- toYaml .Values.backend.env | nindent 8 }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu }}
            memory: {{ .Values.backend.resources.requests.memory }}
          limits:
            cpu: {{ .Values.backend.resources.limits.cpu }}
            memory: {{ .Values.backend.resources.limits.memory }}
        # Lenient liveness: a heavy in-thread sync (PyIceberg + pandas) holds the GIL
        # and can stall the event loop for tens of seconds. ~90s grace prevents that
        # from triggering pod restarts mid-sync (heavy syncs belong on Airflow DAGs;
        # this protects the "Sync Now" path).
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 4
        {{- if (dig "enabled" true .Values.airflow) }}
        volumeMounts:
        - name: airflow-dags
          mountPath: /opt/airflow/dags
        {{- end }}
      {{- if (dig "enabled" true .Values.airflow) }}
      volumes:
      - name: airflow-dags
        persistentVolumeClaim:
          claimName: airflow-dags-pvc
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.backend.name }}
---
{{- if .Values.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.backend.name }}
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
