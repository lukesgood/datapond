{{- if .Values.openmetadata.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: openmetadata-connectors
  namespace: {{ .Values.namespace }}
data:
  # Trino connector configuration
  trino-connector.json: |
    {
      "type": "Trino",
      "serviceName": "datapond-trino",
      "serviceConnection": {
        "config": {
          "type": "Trino",
          "username": "trino",
          "hostPort": "{{ .Values.trino.name }}:{{ .Values.trino.service.port }}",
          "catalog": "iceberg",
          "databaseSchema": "analytics",
          "connectionOptions": {},
          "connectionArguments": {},
          "supportsMetadataExtraction": true,
          "supportsProfiler": true,
          "supportsQueryComment": true
        }
      },
      "sourceConfig": {
        "config": {
          "type": "DatabaseMetadata",
          "markDeletedTables": true,
          "includeTables": true,
          "includeViews": true,
          "includeTags": true,
          "useFqnForFiltering": true
        }
      }
    }

  # PostgreSQL connector configuration
  postgres-connector.json: |
    {
      "type": "Postgres",
      "serviceName": "datapond-postgres",
      "serviceConnection": {
        "config": {
          "type": "Postgres",
          "username": "{{ .Values.postgres.auth.username }}",
          "authType": {
            "password": "{{ .Values.postgres.auth.password }}"
          },
          "hostPort": "{{ .Values.postgres.name }}:{{ .Values.postgres.service.port }}",
          "database": "{{ .Values.postgres.auth.database }}",
          "connectionOptions": {},
          "connectionArguments": {},
          "supportsMetadataExtraction": true,
          "supportsDBTExtraction": true,
          "supportsProfiler": true,
          "supportsQueryComment": true
        }
      },
      "sourceConfig": {
        "config": {
          "type": "DatabaseMetadata",
          "markDeletedTables": true,
          "includeTables": true,
          "includeViews": true,
          "includeTags": true,
          "schemaFilterPattern": {
            "includes": ["public"]
          }
        }
      }
    }

  {{- if .Values.airflow.enabled }}
  # Airflow connector configuration
  airflow-connector.json: |
    {
      "type": "Airflow",
      "serviceName": "datapond-airflow",
      "serviceConnection": {
        "config": {
          "type": "Airflow",
          "hostPort": "http://{{ .Values.airflow.name }}:{{ .Values.airflow.webserver.service.port }}",
          "connection": {
            "type": "Backend",
            "backend": {
              "username": "{{ .Values.airflow.auth.username }}",
              "password": "{{ .Values.airflow.auth.password }}"
            }
          },
          "numberOfStatus": 10,
          "supportsMetadataExtraction": true
        }
      },
      "sourceConfig": {
        "config": {
          "type": "PipelineMetadata",
          "includeLineage": true,
          "includeTags": true,
          "pipelineFilterPattern": {
            "includes": [".*"]
          }
        }
      }
    }
  {{- end }}

  {{- if .Values.spark.enabled }}
  # Spark connector configuration (via Hive Metastore)
  spark-connector.json: |
    {
      "type": "Spark",
      "serviceName": "datapond-spark",
      "serviceConnection": {
        "config": {
          "type": "Spark",
          "hostPort": "{{ .Values.spark.name }}-master:{{ .Values.spark.master.service.sparkPort }}",
          "connectionOptions": {},
          "connectionArguments": {},
          "supportsMetadataExtraction": true
        }
      },
      "sourceConfig": {
        "config": {
          "type": "DatabaseMetadata",
          "includeTables": true,
          "includeViews": false
        }
      }
    }
  {{- end }}

  # Ingestion workflow schedule (daily at 2 AM)
  ingestion-schedule.yaml: |
    schedule:
      cron: "0 2 * * *"  # Daily at 2 AM
      timezone: "UTC"
    retries: 3
    retryDelay: 300  # 5 minutes
    timeout: 3600    # 1 hour

  # Data quality tests configuration
  data-quality-tests.yaml: |
    tests:
      - name: "table_row_count"
        testType: "tableCustomSQLQuery"
        params:
          sqlExpression: "SELECT COUNT(*) as row_count FROM {table}"
          threshold: 0
          operator: ">"

      - name: "column_values_not_null"
        testType: "columnValuesToBeNotNull"
        params:
          columnName: "{column}"

      - name: "column_values_unique"
        testType: "columnValuesToBeUnique"
        params:
          columnName: "{column}"

      - name: "column_values_in_set"
        testType: "columnValuesToBeInSet"
        params:
          columnName: "{column}"
          allowedValues: []

  # Glossary terms for DataPond
  glossary-terms.yaml: |
    glossary:
      - name: "Customer Data"
        description: "Data related to customers including PII"
        tags: ["PII", "sensitive"]

      - name: "Analytics Data"
        description: "Aggregated data for analytics and reporting"
        tags: ["analytics", "derived"]

      - name: "Real-time Events"
        description: "Streaming events processed in real-time"
        tags: ["streaming", "real-time"]

      - name: "ML Features"
        description: "Features used for machine learning models"
        tags: ["ml", "features"]
{{- end }}
