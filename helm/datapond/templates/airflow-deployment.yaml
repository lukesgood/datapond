{{- if .Values.airflow.enabled }}
---
# Airflow Webserver
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.airflow.name }}-webserver
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.airflow.name }}
    component: webserver
spec:
  replicas: {{ .Values.airflow.webserver.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.airflow.name }}
      component: webserver
  template:
    metadata:
      labels:
        app: {{ .Values.airflow.name }}
        component: webserver
    spec:
      initContainers:
      - name: init-db
        image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
        command:
        - /bin/bash
        - -c
        args:
        - |
          airflow db init && \
          airflow users create \
            --username {{ .Values.airflow.auth.username }} \
            --password "$AIRFLOW_ADMIN_PASSWORD" \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com || true
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        - name: AIRFLOW__CORE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://{{ .Values.postgres.auth.username | default "datapond" }}:$(POSTGRES_PASSWORD)@postgres:5432/airflow"
        - name: AIRFLOW__CORE__EXECUTOR
          value: {{ .Values.airflow.executor }}
        - name: AIRFLOW_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: AIRFLOW_PASSWORD
      containers:
      - name: webserver
        image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
        ports:
        - containerPort: {{ .Values.airflow.webserver.service.port }}
          name: http
        command:
        - airflow
        - webserver
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        - name: AIRFLOW__CORE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://{{ .Values.postgres.auth.username | default "datapond" }}:$(POSTGRES_PASSWORD)@postgres:5432/airflow"
        - name: AIRFLOW__CORE__EXECUTOR
          value: {{ .Values.airflow.executor }}
        - name: AIRFLOW__WEBSERVER__BASE_URL
          value: "{{ .Values.global.externalScheme | default "http" }}://{{ .Values.ingress.domain | default .Values.global.domain }}/airflow"
        # Honor X-Forwarded-Proto/Host from the ingress/ALB so generated URLs and
        # redirects use the external https scheme — otherwise the browser blocks
        # them as Mixed Content when TLS is terminated upstream.
        - name: AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX
          value: "True"
        - name: AIRFLOW__WEBSERVER__WEB_SERVER_PORT
          value: "{{ .Values.airflow.webserver.service.port }}"
        - name: AIRFLOW__API__AUTH_BACKENDS
          value: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
        {{- if .Values.airflow.smtp.enabled }}
        - name: AIRFLOW__SMTP__SMTP_HOST
          value: "{{ .Values.airflow.smtp.host }}"
        - name: AIRFLOW__SMTP__SMTP_PORT
          value: "{{ .Values.airflow.smtp.port }}"
        - name: AIRFLOW__SMTP__SMTP_STARTTLS
          value: "{{ .Values.airflow.smtp.starttls }}"
        - name: AIRFLOW__SMTP__SMTP_SSL
          value: "{{ .Values.airflow.smtp.ssl }}"
        - name: AIRFLOW__SMTP__SMTP_USER
          value: "{{ .Values.airflow.smtp.user }}"
        - name: AIRFLOW__SMTP__SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: AIRFLOW_SMTP_PASSWORD
              optional: true
        - name: AIRFLOW__SMTP__SMTP_MAIL_FROM
          value: "{{ .Values.airflow.smtp.mailFrom }}"
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.airflow.webserver.resources.requests.cpu }}
            memory: {{ .Values.airflow.webserver.resources.requests.memory }}
          limits:
            cpu: {{ .Values.airflow.webserver.resources.limits.cpu }}
            memory: {{ .Values.airflow.webserver.resources.limits.memory }}
        {{- if .Values.airflow.persistence.enabled }}
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /opt/airflow/logs
        {{- end }}
      {{- if .Values.airflow.persistence.enabled }}
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: airflow-logs-pvc
      {{- end }}
---
# Airflow Scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.airflow.name }}-scheduler
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.airflow.name }}
    component: scheduler
spec:
  replicas: {{ .Values.airflow.scheduler.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.airflow.name }}
      component: scheduler
  template:
    metadata:
      labels:
        app: {{ .Values.airflow.name }}
        component: scheduler
    spec:
      containers:
      - name: scheduler
        image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
        command:
        - airflow
        - scheduler
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: POSTGRES_PASSWORD
        - name: AIRFLOW__CORE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://{{ .Values.postgres.auth.username | default "datapond" }}:$(POSTGRES_PASSWORD)@postgres:5432/airflow"
        - name: AIRFLOW__CORE__EXECUTOR
          value: {{ .Values.airflow.executor }}
        # Lets scheduled RAG-ingest DAGs authenticate to the backend (X-Internal-Key).
        {{- if .Values.backend.enabled }}
        - name: DATAPOND_INTERNAL_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: INTERNAL_API_KEY
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.airflow.scheduler.resources.requests.cpu }}
            memory: {{ .Values.airflow.scheduler.resources.requests.memory }}
          limits:
            cpu: {{ .Values.airflow.scheduler.resources.limits.cpu }}
            memory: {{ .Values.airflow.scheduler.resources.limits.memory }}
        {{- if .Values.airflow.persistence.enabled }}
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /opt/airflow/logs
        {{- end }}
      {{- if .Values.airflow.persistence.enabled }}
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: airflow-logs-pvc
      {{- end }}
---
# Airflow Webserver Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.airflow.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.airflow.webserver.service.type }}
  ports:
  - port: {{ .Values.airflow.webserver.service.port }}
    targetPort: {{ .Values.airflow.webserver.service.port }}
    name: http
  selector:
    app: {{ .Values.airflow.name }}
    component: webserver
{{- if .Values.airflow.persistence.enabled }}
---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.airflow.persistence.dags.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-logs-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.airflow.persistence.logs.size }}
{{- end }}
{{- end }}
