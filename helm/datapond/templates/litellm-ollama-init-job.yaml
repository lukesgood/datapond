{{- if and .Values.ollama.enabled .Values.litellm.enabled }}
---
# Auto-register the local Ollama model in the LiteLLM gateway (DB mode) so AI SQL
# works with an on-prem LLM out of the box — no manual Settings → AI step. This is
# what makes ai.egressPolicy=local-only usable: the active "default" model resolves
# to a local Ollama backend, so sovereign deployments get working, no-egress AI.
# Idempotent: tolerates "model already exists" so Helm upgrades re-run cleanly.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.litellm.name }}-ollama-init
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.litellm.name }}
    component: ollama-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: {{ .Values.litellm.name }}-ollama-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: ollama-init
        image: curlimages/curl:8.10.1
        env:
        - name: LITELLM_URL
          value: "http://{{ .Values.litellm.name }}:{{ .Values.litellm.service.port }}"
        - name: OLLAMA_URL
          value: "http://{{ .Values.ollama.name }}:{{ .Values.ollama.service.port }}"
        - name: MODEL_NAME
          value: "{{ .Values.ollama.litellmModelName | default "default" }}"
        - name: OLLAMA_MODEL
          value: "{{ .Values.ollama.defaultModel }}"
        - name: EMBED_NAME
          value: "{{ .Values.ollama.embedLitellmName | default "embed" }}"
        - name: EMBED_MODEL
          value: "{{ .Values.ollama.embedModel }}"
        - name: MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: LITELLM_MASTER_KEY
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for LiteLLM gateway..."
          i=0
          until curl -sf "$LITELLM_URL/health/readiness" >/dev/null 2>&1; do
            i=$((i+1)); [ "$i" -gt 60 ] && { echo "ERROR: LiteLLM not ready after 300s"; exit 1; }
            sleep 5
          done
          AUTH="Authorization: Bearer $MASTER_KEY"

          # register <litellm_model_name> <ollama/model> [mode]
          # Config only — does not need Ollama up yet; the model serves once pulled.
          # Idempotent: tolerates "already exists" so Helm upgrades re-run cleanly.
          register() {
            NAME="$1"; OMODEL="$2"; MODE="$3"
            EXTRA=""
            [ "$MODE" = "embedding" ] && EXTRA=",\"mode\":\"embedding\""
            echo "Registering '$NAME' -> $OMODEL @ $OLLAMA_URL ${MODE:+($MODE)}"
            code=$(curl -s -o /tmp/o -w "%{http_code}" -X POST "$LITELLM_URL/model/new" \
              -H "$AUTH" -H "Content-Type: application/json" -d "{
                \"model_name\":\"$NAME\",
                \"litellm_params\":{\"model\":\"$OMODEL\",\"api_base\":\"$OLLAMA_URL\"${EXTRA}}}")
            echo "  model/new -> $code"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then
              echo "  registered '$NAME'."
            elif grep -qi "already exists\|duplicate" /tmp/o; then
              echo "  already registered — ok."
            else
              cat /tmp/o; echo "ERROR: model registration failed ($code)"; exit 1
            fi
          }

          # Chat/SQL model (the active "default" for AI SQL + RAG generation).
          register "$MODEL_NAME" "ollama/$OLLAMA_MODEL"

          # Embedding model for sovereign RAG (no egress) — only if configured.
          if [ -n "$EMBED_MODEL" ]; then
            register "$EMBED_NAME" "ollama/$EMBED_MODEL" "embedding"
          else
            echo "No ollama.embedModel set — skipping local embedding registration."
          fi
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
{{- end }}
