{{- if .Values.spark.enabled }}
---
# Spark Master
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.spark.name }}-master
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
    component: master
spec:
  serviceName: {{ .Values.spark.name }}-master
  replicas: {{ .Values.spark.master.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.spark.name }}
      component: master
  template:
    metadata:
      labels:
        app: {{ .Values.spark.name }}
        component: master
    spec:
      containers:
      - name: spark-master
        image: "{{ .Values.spark.image.repository }}:{{ .Values.spark.image.tag }}"
        ports:
        - containerPort: {{ .Values.spark.master.service.sparkPort }}
          name: spark
        - containerPort: {{ .Values.spark.master.service.webPort }}
          name: http
        env:
        - name: SPARK_MODE
          value: "master"
        - name: SPARK_RPC_AUTHENTICATION_ENABLED
          value: "no"
        - name: SPARK_RPC_ENCRYPTION_ENABLED
          value: "no"
        # Iceberg configurations
        - name: SPARK_JARS_PACKAGES
          value: "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4,software.amazon.awssdk:bundle:2.20.18,software.amazon.awssdk:url-connection-client:2.20.18"
        - name: SPARK_SQL_EXTENSIONS
          value: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
        - name: SPARK_SQL_CATALOG_ICEBERG
          value: "org.apache.iceberg.spark.SparkCatalog"
        - name: SPARK_SQL_CATALOG_ICEBERG_TYPE
          value: "hadoop"
        - name: SPARK_SQL_CATALOG_ICEBERG_WAREHOUSE
          value: "s3a://iceberg/warehouse"
        - name: SPARK_SQL_CATALOG_ICEBERG_IO_IMPL
          value: "org.apache.iceberg.aws.s3.S3FileIO"
        # S3 configurations
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        - name: AWS_REGION
          value: "us-east-1"
        - name: SPARK_HADOOP_FS_S3A_ENDPOINT
          value: "http://seaweedfs-s3:8333"
        - name: SPARK_HADOOP_FS_S3A_PATH_STYLE_ACCESS
          value: "true"
        - name: SPARK_HADOOP_FS_S3A_IMPL
          value: "org.apache.hadoop.fs.s3a.S3AFileSystem"
        resources:
          requests:
            cpu: {{ .Values.spark.master.resources.requests.cpu }}
            memory: {{ .Values.spark.master.resources.requests.memory }}
          limits:
            cpu: {{ .Values.spark.master.resources.limits.cpu }}
            memory: {{ .Values.spark.master.resources.limits.memory }}
---
# Spark Master Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.spark.name }}-master
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.spark.master.service.type }}
  ports:
  - port: {{ .Values.spark.master.service.sparkPort }}
    targetPort: {{ .Values.spark.master.service.sparkPort }}
    name: spark
  - port: {{ .Values.spark.master.service.webPort }}
    targetPort: {{ .Values.spark.master.service.webPort }}
    name: http
  selector:
    app: {{ .Values.spark.name }}
    component: master
---
# Spark Worker
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.spark.name }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
    component: worker
spec:
  serviceName: {{ .Values.spark.name }}-worker
  replicas: {{ .Values.spark.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.spark.name }}
      component: worker
  template:
    metadata:
      labels:
        app: {{ .Values.spark.name }}
        component: worker
    spec:
      containers:
      - name: spark-worker
        image: "{{ .Values.spark.image.repository }}:{{ .Values.spark.image.tag }}"
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SPARK_MODE
          value: "worker"
        - name: SPARK_MASTER_URL
          value: "spark://{{ .Values.spark.name }}-master:{{ .Values.spark.master.service.sparkPort }}"
        - name: SPARK_RPC_AUTHENTICATION_ENABLED
          value: "no"
        - name: SPARK_RPC_ENCRYPTION_ENABLED
          value: "no"
        # Iceberg configurations (same as master)
        - name: SPARK_JARS_PACKAGES
          value: "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.3,org.apache.hadoop:hadoop-aws:3.3.4,software.amazon.awssdk:bundle:2.20.18,software.amazon.awssdk:url-connection-client:2.20.18"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        - name: AWS_REGION
          value: "us-east-1"
        - name: SPARK_HADOOP_FS_S3A_ENDPOINT
          value: "http://seaweedfs-s3:8333"
        - name: SPARK_HADOOP_FS_S3A_PATH_STYLE_ACCESS
          value: "true"
        {{- range .Values.spark.worker.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.spark.worker.resources.requests.cpu }}
            memory: {{ .Values.spark.worker.resources.requests.memory }}
          limits:
            cpu: {{ .Values.spark.worker.resources.limits.cpu }}
            memory: {{ .Values.spark.worker.resources.limits.memory }}
---
# Spark Worker Service (Headless)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.spark.name }}-worker
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  ports:
  - port: 8081
    targetPort: 8081
    name: http
  selector:
    app: {{ .Values.spark.name }}
    component: worker
{{- end }}
