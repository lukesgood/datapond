{{- if .Values.spark.enabled }}
---
# Spark Master.
# The apache/spark image does NOT honor bitnami-style SPARK_MODE env — it has no
# start logic of its own. We must give it an explicit foreground command that runs
# the Master class via spark-class (validated: elects leader, ALIVE). Iceberg/Polaris/
# S3 job config lives in spark-defaults.conf (mounted), not in env (apache/spark would
# ignore SPARK_SQL_*/SPARK_HADOOP_* env). AWS_* are standard creds the S3 SDK reads.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.spark.name }}-master
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
    component: master
spec:
  serviceName: {{ .Values.spark.name }}-master
  replicas: {{ .Values.spark.master.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.spark.name }}
      component: master
  template:
    metadata:
      labels:
        app: {{ .Values.spark.name }}
        component: master
    spec:
      containers:
      - name: spark-master
        image: "{{ .Values.spark.image.repository }}:{{ .Values.spark.image.tag }}"
        command:
        - /opt/spark/bin/spark-class
        - org.apache.spark.deploy.master.Master
        - --host
        - "0.0.0.0"
        - --port
        - "{{ .Values.spark.master.service.sparkPort }}"
        - --webui-port
        - "{{ .Values.spark.master.service.webPort }}"
        ports:
        - containerPort: {{ .Values.spark.master.service.sparkPort }}
          name: spark
        - containerPort: {{ .Values.spark.master.service.webPort }}
          name: http
        env:
        {{- if .Values.storage.endpoint }}
        # Standard AWS creds (read by hadoop-aws / S3FileIO for on-prem S3-compat).
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        {{- end }}
        - name: AWS_REGION
          value: "{{ .Values.storage.region | default "us-east-1" }}"
        volumeMounts:
        - name: spark-conf
          mountPath: /opt/spark/conf/spark-defaults.conf
          subPath: spark-defaults.conf
        readinessProbe:
          tcpSocket:
            port: {{ .Values.spark.master.service.sparkPort }}
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: {{ .Values.spark.master.service.sparkPort }}
          initialDelaySeconds: 40
          periodSeconds: 20
        resources:
          requests:
            cpu: {{ .Values.spark.master.resources.requests.cpu }}
            memory: {{ .Values.spark.master.resources.requests.memory }}
          limits:
            cpu: {{ .Values.spark.master.resources.limits.cpu }}
            memory: {{ .Values.spark.master.resources.limits.memory }}
      volumes:
      - name: spark-conf
        configMap:
          name: {{ .Values.spark.name }}-defaults
---
# Spark Master Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.spark.name }}-master
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.spark.master.service.type }}
  ports:
  - port: {{ .Values.spark.master.service.sparkPort }}
    targetPort: {{ .Values.spark.master.service.sparkPort }}
    name: spark
  - port: {{ .Values.spark.master.service.webPort }}
    targetPort: {{ .Values.spark.master.service.webPort }}
    name: http
  selector:
    app: {{ .Values.spark.name }}
    component: master
---
# Spark Worker
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.spark.name }}-worker
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.spark.name }}
    component: worker
spec:
  serviceName: {{ .Values.spark.name }}-worker
  replicas: {{ .Values.spark.worker.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.spark.name }}
      component: worker
  template:
    metadata:
      labels:
        app: {{ .Values.spark.name }}
        component: worker
    spec:
      containers:
      - name: spark-worker
        image: "{{ .Values.spark.image.repository }}:{{ .Values.spark.image.tag }}"
        command:
        - /opt/spark/bin/spark-class
        - org.apache.spark.deploy.worker.Worker
        - "spark://{{ .Values.spark.name }}-master:{{ .Values.spark.master.service.sparkPort }}"
        - --webui-port
        - "8081"
        ports:
        - containerPort: 8081
          name: http
        env:
        {{- if .Values.storage.endpoint }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: datapond-secrets
              key: SEAWEEDFS_S3_PASSWORD
        {{- end }}
        - name: AWS_REGION
          value: "{{ .Values.storage.region | default "us-east-1" }}"
        # SPARK_WORKER_CORES / SPARK_WORKER_MEMORY (standard Spark env — cap the worker).
        {{- range .Values.spark.worker.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: spark-conf
          mountPath: /opt/spark/conf/spark-defaults.conf
          subPath: spark-defaults.conf
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 25
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ .Values.spark.worker.resources.requests.cpu }}
            memory: {{ .Values.spark.worker.resources.requests.memory }}
          limits:
            cpu: {{ .Values.spark.worker.resources.limits.cpu }}
            memory: {{ .Values.spark.worker.resources.limits.memory }}
      volumes:
      - name: spark-conf
        configMap:
          name: {{ .Values.spark.name }}-defaults
---
# Spark Worker Service (Headless)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.spark.name }}-worker
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: None
  ports:
  - port: 8081
    targetPort: 8081
    name: http
  selector:
    app: {{ .Values.spark.name }}
    component: worker
{{- end }}
