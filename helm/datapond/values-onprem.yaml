# Sovereign OSS Extended profile
# ------------------------------
# Self-hosted Portable Core plus optional OSS data services. This profile favors
# local control and provider independence over the smallest operational footprint;
# disable add-ons you do not need. Recommended capacity starts at 32 GB RAM.
#
# Usage:
#   helm upgrade datapond helm/datapond \
#     --namespace datapond \
#     --values helm/datapond/values-onprem.yaml

product:
  profile:
    id: sovereign-oss-extended
    label: Sovereign OSS Extended
    description: Self-hosted Portable Core with local model, storage, catalog, and data add-ons.
    maturity: community
    topology: self-hosted-kubernetes

# в”Җв”Җ Global в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
global:
  domain: datapond.local          # Change to your actual hostname or IP
  storageClass: local-path        # K3s default; use longhorn/rook for HA
  imagePullPolicy: IfNotPresent

namespace: datapond

# в”Җв”Җ Ingress в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false                # Set true + secretName for HTTPS with cert-manager

# в”Җв”Җ Frontend в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/frontend
    tag: ""   # empty вҮ’ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false

# в”Җв”Җ Backend в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
backend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/backend
    tag: ""   # empty вҮ’ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent
  env:
    # LiteLLM is the primary AI provider вҖ” Ollama backend
    - name: LITELLM_URL
      value: "http://litellm.datapond.svc.cluster.local:4000"
    - name: LITELLM_MODEL
      value: "default"
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: false

# в”Җв”Җ PostgreSQL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
postgres:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 50Gi
  auth:
    database: datapond
    username: datapond
    password: ""  # empty вҮ’ Helm generates & preserves (see templates/secrets.yaml)

# в”Җв”Җ Valkey (Redis-compatible cache / sessions) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
valkey:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi

# в”Җв”Җ JupyterLab в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
jupyter:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 20Gi
  extensions:
    git: true
    nbdime: true
  gitConfig:
    defaultUser: "DataPond User"
    defaultEmail: "user@datapond.local"

# в”Җв”Җ MLflow в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
mlflow:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi

# в”Җв”Җ Airflow (LocalExecutor вҖ” no worker pods needed) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
airflow:
  enabled: true
  executor: LocalExecutor
  webserver:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  worker:
    enabled: false
  persistence:
    enabled: true
    dags:
      size: 10Gi
    logs:
      size: 10Gi
  auth:
    username: airflow
    password: ""  # empty вҮ’ Helm generates & preserves (see templates/secrets.yaml)
  smtp:
    enabled: false

# в”Җв”Җ Spark вҖ” disabled by default (heavy resource consumer) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Enable when batch ETL workloads require distributed compute
spark:
  # л¶„мӮ° л°°м№ҳ(AirflowвҶ’SparkвҶ’Iceberg) кІҪлЎң. 32GB+ л…ёл“ң к¶ҢмһҘ. лӢЁмқјл…ёл“ң л¶ҖлӢҙмқ„ мӨ„мқҙл Ө
  # worker 1к°ңлЎң мӢңмһ‘(н•„мҡ” мӢң лҠҳлҰј). л№„нҷңм„ұн•ҳл Өл©ҙ enabled:false нӣ„ DuckDB/TrinoлЎң лҢҖмІҙ.
  enabled: true
  worker:
    replicas: 1

# в”Җв”Җ Storage (S3 routing) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Points backend at MinIO S3 endpoint (enables S3_ACCESS_KEY/S3_SECRET_KEY).
storage:
  endpoint: "minio:9000"
  region: "us-east-1"
  bucket: iceberg

# в”Җв”Җ MinIO (S3-compatible object storage) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Primary storage layer вҖ” all Iceberg data, MLflow artifacts, etc.
minio:
  enabled: true
  clusterIP: 10.43.107.150
  auth:
    rootUser: datapond
    rootPassword: ""  # empty вҮ’ Helm generates & preserves (see templates/secrets.yaml)
  persistence:
    size: 100Gi

# в”Җв”Җ Trino (OLAP SQL analytics engine) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
trino:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 20Gi

# в”Җв”Җ Apache Polaris (Iceberg REST catalog вҖ” Unity Catalog equivalent) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
polaris:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# в”Җв”Җ RisingWave (real-time streaming SQL) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
risingwave:
  enabled: true
  meta:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  frontend:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  compute:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  compactor:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# в”Җв”Җ OpenMetadata (data catalog & lineage) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
openmetadata:
  enabled: true
  server:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1024m"
  elasticsearch:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1g"
    persistence:
      size: 20Gi

# в”Җв”Җ AI / LLM (BYO-LLM кё°ліё) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# мҳЁн”„л ҳ кё°ліё: мӮ¬лӮҙ OpenAI нҳёнҷҳ LLM м—”л“ңнҸ¬мқёнҠёлҘј к°ҖлҰ¬нӮӨлҠ” BYO л°©мӢқ.
# лӢЁмқј/мҶҢнҳ• л…ёл“ңм—җ 7B лӘЁлҚёмқ„ co-locateн•ҳм§Җ м•ҠлҠ”лӢӨ(4~8GB RAM + CPU м¶”лЎ  л¶ҖлӢҙ).
# м•„лһҳ llmEndpointлҘј мӮ¬лӮҙ vLLM/Ollama/LiteLLM URLлЎң м„Өм •н•ҳл©ҙ AI(мһҗм—°м–ҙ SQL) нҷңм„ұнҷ”.
ai:
  provider: ollama
  llmEndpoint: ""        # мҳҲ: http://my-llm.internal:8000  (л№„мҡ°л©ҙ AI л№„нҷңм„ұ)
  llmModel: "default"
  # мЈјк¶Ң/мҳЁн”„л ҳ кё°ліё: лЎңм»¬ LLM(Ollama/vLLM)л§Ң н—Ҳмҡ©, мҷёл¶Җ нҒҙлқјмҡ°л“ң LLM м°ЁлӢЁ(л¬ҙмң м¶ң).
  # мҷёл¶Җ м ңкіөмһҗлҘј мҚЁм•ј н•ҳл©ҙ cloud-allowedлЎң ліҖкІҪ.
  egressPolicy: "local-only"

# в”Җв”Җ LiteLLM вҖ” AI кІҢмқҙнҠёмӣЁмқҙ (лӢЁмқј м§„мһ…м җ, кё°ліё ON) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# кІҪлҹү н”„лЎқмӢң(лӘЁлҚё к°ҖмӨ‘м№ҳ м—ҶмқҢ). лӘЁл“  LLM л°ұм—”л“ң(Bedrock/Anthropic/мӮ¬лӮҙ vLLMВ·Ollama л“ұ)лҘј
# Settings вҶ’ AIм—җм„ң лҹ°нғҖмһ„ л“ұлЎқ/м „нҷҳ(DB лӘЁл“ң). seed лӘЁлҚё м—ҶмқҢ вҖ” UIм—җм„ң кө¬м„ұ.
litellm:
  enabled: true
  config:
    model_list: []

# в”Җв”Җ Ollama вҖ” co-located LLM runtime (мҳөм…ҳ, кё°ліё OFF) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# 7B лӘЁлҚёмқҖ 4~8GB RAM + CPU м¶”лЎ мқҙ л¬ҙкұ°мӣҢ лӢЁмқј л…ёл“ңм—җ л¶Җм Ғн•©(15GB л…ёл“ңм—” мҠӨмјҖмӨ„ л¶Ҳк°Җ).
# GPU/м—¬мң  мһҗмӣҗ ліҙмң  лҢҖк·ңлӘЁ л°°нҸ¬м—җм„ңл§Ң нҷңм„ұнҷ”н•ҳкі  к°ҖлҠҘн•ҳл©ҙ м „мҡ© л…ёл“ңм—җ мҠӨмјҖмӨ„.
# вҡ пёҸ м—җм–ҙк°ӯ: defaultModelмқҖ startupм—җ Docker Hubм—җм„ң pullлҗЁ вҶ’ мӮ¬м „ м Ғмһ¬ н•„мҡ”(лі„лҸ„ мһ‘м—…).
ollama:
  # мЈјк¶Ң/л¬ҙмң м¶ң AI: мҳЁн”„л ҳмқҖ лЎңм»¬ LLMмқ„ кё°ліё нҷңм„ұнҷ”. ai.egressPolicy=local-onlyмҷҖ м§қ.
  # 7B лӘЁлҚёмқҖ ~4GB + CPU м¶”лЎ мқҙ л¬ҙкұ°мӣҖ вҶ’ 32GB+ л…ёл“ң к¶ҢмһҘ. к°ҖлІјмҡҙ л…ёл“ңл©ҙ defaultModelмқ„
  # qwen2.5-coder:3b л“ұмңјлЎң лӮ®м¶”кұ°лӮҳ enabled:false нӣ„ мҷёл¶Җ vLLM/OllamaлҘј BYO.
  enabled: true
  defaultModel: "qwen2.5-coder:7b"
  # мЈјк¶Ң RAGмҡ© лЎңм»¬ мһ„лІ л”©(л¬ҙмң м¶ң). bge-m3 = 1024-d(ai.embedDim кё°ліёкіј мқјм№ҳ) + лӢӨкөӯм–ҙ(н•ңкөӯм–ҙ к°•н•Ё).
  # post-install нӣ…мқҙ LiteLLMм—җ "embed"(=AI_EMBED_MODEL)лЎң мһҗлҸҷ л“ұлЎқ вҶ’ /ai/{ingest,search,rag} лЎңм»¬ мӮ¬мҡ©.
  embedModel: "bge-m3"
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 20Gi

# в”Җв”Җ Monitoring вҖ” disabled by default (add Prometheus/Grafana separately) в”Җв”Җв”Җв”Җв”Җв”Җ
monitoring:
  enabled: false
