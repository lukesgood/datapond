# On-Premises deployment profile — complete production-ready configuration
# Based on values-quicktest.yaml, expanded for on-prem environments with:
#   - All services enabled (MinIO, Ollama, LiteLLM, Polaris, etc.)
#   - Reasonable resource allocations for a 32GB+ RAM node
#   - Air-gap friendly (no external dependencies required)
#
# Usage:
#   helm upgrade datapond helm/datapond \
#     --namespace datapond \
#     --values helm/datapond/values-onprem.yaml

# ── Global ────────────────────────────────────────────────────────────────────
global:
  domain: datapond.local          # Change to your actual hostname or IP
  storageClass: local-path        # K3s default; use longhorn/rook for HA
  imagePullPolicy: IfNotPresent

namespace: datapond

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false                # Set true + secretName for HTTPS with cert-manager

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/frontend
    tag: ""   # empty ⇒ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false

# ── Backend ───────────────────────────────────────────────────────────────────
backend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/backend
    tag: ""   # empty ⇒ chart appVersion (Chart.yaml); override for local dev / CD sha tags
    pullPolicy: IfNotPresent
  env:
    # LiteLLM is the primary AI provider — Ollama backend
    - name: LITELLM_URL
      value: "http://litellm.datapond.svc.cluster.local:4000"
    - name: LITELLM_MODEL
      value: "default"
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: false

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 50Gi
  auth:
    database: datapond
    username: datapond
    password: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)

# ── Valkey (Redis-compatible cache / sessions) ─────────────────────────────────
valkey:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi

# ── JupyterLab ────────────────────────────────────────────────────────────────
jupyter:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 20Gi
  extensions:
    git: true
    nbdime: true
  gitConfig:
    defaultUser: "DataPond User"
    defaultEmail: "user@datapond.local"

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 20Gi

# ── Airflow (LocalExecutor — no worker pods needed) ────────────────────────────
airflow:
  enabled: true
  executor: LocalExecutor
  webserver:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  worker:
    enabled: false
  persistence:
    enabled: true
    dags:
      size: 10Gi
    logs:
      size: 10Gi
  auth:
    username: airflow
    password: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)
  smtp:
    enabled: false

# ── Spark — disabled by default (heavy resource consumer) ─────────────────────
# Enable when batch ETL workloads require distributed compute
spark:
  # 분산 배치(Airflow→Spark→Iceberg) 경로. 32GB+ 노드 권장. 단일노드 부담을 줄이려
  # worker 1개로 시작(필요 시 늘림). 비활성하려면 enabled:false 후 DuckDB/Trino로 대체.
  enabled: true
  worker:
    replicas: 1

# ── Storage (S3 routing) ──────────────────────────────────────────────────────
# Points backend at MinIO S3 endpoint (enables S3_ACCESS_KEY/S3_SECRET_KEY).
storage:
  endpoint: "minio:9000"
  region: "us-east-1"
  bucket: iceberg

# ── MinIO (S3-compatible object storage) ─────────────────────────────────────
# Primary storage layer — all Iceberg data, MLflow artifacts, etc.
minio:
  enabled: true
  clusterIP: 10.43.107.150
  auth:
    rootUser: datapond
    rootPassword: ""  # empty ⇒ Helm generates & preserves (see templates/secrets.yaml)
  persistence:
    size: 100Gi

# ── Trino (OLAP SQL analytics engine) ────────────────────────────────────────
trino:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  persistence:
    enabled: true
    size: 20Gi

# ── Apache Polaris (Iceberg REST catalog — Unity Catalog equivalent) ──────────
polaris:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ── RisingWave (real-time streaming SQL) ──────────────────────────────────────
risingwave:
  enabled: true
  meta:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  frontend:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  compute:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  compactor:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# ── OpenMetadata (data catalog & lineage) ────────────────────────────────────
openmetadata:
  enabled: true
  server:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1024m"
  elasticsearch:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1g"
    persistence:
      size: 20Gi

# ── AI / LLM (BYO-LLM 기본) ───────────────────────────────────────────────────
# 온프렘 기본: 사내 OpenAI 호환 LLM 엔드포인트를 가리키는 BYO 방식.
# 단일/소형 노드에 7B 모델을 co-locate하지 않는다(4~8GB RAM + CPU 추론 부담).
# 아래 llmEndpoint를 사내 vLLM/Ollama/LiteLLM URL로 설정하면 AI(자연어 SQL) 활성화.
ai:
  llmEndpoint: ""        # 예: http://my-llm.internal:8000  (비우면 AI 비활성)
  llmModel: "default"
  # 주권/온프렘 기본: 로컬 LLM(Ollama/vLLM)만 허용, 외부 클라우드 LLM 차단(무유출).
  # 외부 제공자를 써야 하면 cloud-allowed로 변경.
  egressPolicy: "local-only"

# ── LiteLLM — AI 게이트웨이 (단일 진입점, 기본 ON) ────────────────────────────
# 경량 프록시(모델 가중치 없음). 모든 LLM 백엔드(Bedrock/Anthropic/사내 vLLM·Ollama 등)를
# Settings → AI에서 런타임 등록/전환(DB 모드). seed 모델 없음 — UI에서 구성.
litellm:
  enabled: true
  config:
    model_list: []

# ── Ollama — co-located LLM runtime (옵션, 기본 OFF) ──────────────────────────
# 7B 모델은 4~8GB RAM + CPU 추론이 무거워 단일 노드에 부적합(15GB 노드엔 스케줄 불가).
# GPU/여유 자원 보유 대규모 배포에서만 활성화하고 가능하면 전용 노드에 스케줄.
# ⚠️ 에어갭: defaultModel은 startup에 Docker Hub에서 pull됨 → 사전 적재 필요(별도 작업).
ollama:
  # 주권/무유출 AI: 온프렘은 로컬 LLM을 기본 활성화. ai.egressPolicy=local-only와 짝.
  # 7B 모델은 ~4GB + CPU 추론이 무거움 → 32GB+ 노드 권장. 가벼운 노드면 defaultModel을
  # qwen2.5-coder:3b 등으로 낮추거나 enabled:false 후 외부 vLLM/Ollama를 BYO.
  enabled: true
  defaultModel: "qwen2.5-coder:7b"
  # 주권 RAG용 로컬 임베딩(무유출). bge-m3 = 1024-d(ai.embedDim 기본과 일치) + 다국어(한국어 강함).
  # post-install 훅이 LiteLLM에 "embed"(=AI_EMBED_MODEL)로 자동 등록 → /ai/{ingest,search,rag} 로컬 사용.
  embedModel: "bge-m3"
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  persistence:
    enabled: true
    size: 20Gi

# ── Monitoring — disabled by default (add Prometheus/Grafana separately) ──────
monitoring:
  enabled: false
