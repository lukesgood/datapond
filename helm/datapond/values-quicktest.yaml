# Quick Test Configuration
# Based on values-dev.yaml but with Backend/Frontend disabled
# Testing data infrastructure only

# Global settings
global:
  domain: datapond.local
  storageClass: local-path
  imagePullPolicy: IfNotPresent

# Namespace
namespace: datapond

# Ingress
ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false

# Frontend - Unified Management UI
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# Backend - API Server
backend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/backend
    tag: latest
    pullPolicy: IfNotPresent
  env:
    - name: ENCRYPTION_KEY
      valueFrom:
        secretKeyRef:
          name: datapond-secrets
          key: encryption-key
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70

# PostgreSQL - Reduced resources
postgres:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi

# Valkey - Minimal (Redis-compatible)
valkey:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi

# JupyterLab - Moderate
jupyter:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi
  extensions:
    git: true
    nbdime: true
  gitConfig:
    defaultUser: "DataPond User"
    defaultEmail: "user@datapond.local"

# MLflow - Minimal
mlflow:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi

# Airflow - Minimal activation for Sprint 2 (LocalExecutor)
airflow:
  enabled: true
  name: airflow
  image:
    repository: apache/airflow
    tag: "2.8.1"
  executor: LocalExecutor
  webserver:
    replicas: 1
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  worker:
    enabled: false
  persistence:
    enabled: true
    dags:
      size: 5Gi
    logs:
      size: 5Gi
  auth:
    username: airflow
    password: airflow

  # SMTP: disabled by default — configure to enable email alerts
  # smtp:
  #   enabled: true
  #   host: "smtp.gmail.com"
  #   port: "587"
  #   starttls: "True"
  #   ssl: "False"
  #   user: "alerts@company.com"
  #   mailFrom: "DataPond <alerts@company.com>"
  # Then set AIRFLOW_SMTP_PASSWORD in datapond-secrets:
  #   kubectl create secret generic datapond-secrets -n datapond \
  #     --from-literal=AIRFLOW_SMTP_PASSWORD="your-app-password" --dry-run=client -o yaml | kubectl apply -f -
  smtp:
    enabled: false
    host: ""
    port: "587"
    starttls: "True"
    ssl: "False"
    user: ""
    mailFrom: "DataPond Alerts <noreply@datapond.local>"

# Spark - Disabled (image issues)
spark:
  enabled: false
  master:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  worker:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    env:
      - name: SPARK_WORKER_CORES
        value: "1"
      - name: SPARK_WORKER_MEMORY
        value: "1G"

# SeaweedFS - Minimal
seaweedfs:
  enabled: true
  volume:
    replicas: 1
    persistence:
      size: 20Gi

# Trino - Minimal (SQL query engine)
trino:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi

# Apache Polaris - Minimal
polaris:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# RisingWave - Minimal (real-time streaming SQL)
risingwave:
  enabled: true
  image:
    tag: "v1.6.0"  # Trying older stable version
  meta:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  frontend:
    replicas: 0
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  compute:
    replicas: 0
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  compactor:
    replicas: 0
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# OpenMetadata - Minimal (data catalog and lineage)
openmetadata:
  enabled: true
  server:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1024m"
  elasticsearch:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1g"
    persistence:
      size: 10Gi

# Monitoring - Disabled for quick test
monitoring:
  enabled: false

# Auth - Simple dev credentials
postgres:
  auth:
    database: datapond
    username: datapond
    password: dev_password

jupyter:
  env:
    - name: JUPYTER_TOKEN
      value: "jupyter"

seaweedfs:
  auth:
    s3User: datapond
    s3Password: datapond_dev
  s3:
    # Static ClusterIP so the CoreDNS override (coredns-custom-configmap.yaml)
    # always resolves virtual-host bucket hostnames to the same endpoint.
    # Verify the IP is inside the service CIDR (k3s default 10.43.0.0/16) and
    # not in use: `kubectl get svc -A | grep 10.43.107.150`
    clusterIP: 10.43.107.150

# LiteLLM proxy — disabled when Ollama is off (single-node RAM constraint).
# On 32GB+ nodes: set both litellm.enabled and ollama.enabled to true.
# Fallback: ai_sql.py will use Bedrock/Anthropic directly if LiteLLM is unavailable.
litellm:
  enabled: false
  config:
    model_list:
      - model_name: "default"
        litellm_params:
          model: "ollama/qwen2.5-coder:7b"
          api_base: "http://ollama.datapond.svc.cluster.local:11434"
      - model_name: "chat"
        litellm_params:
          model: "ollama/qwen2.5-coder:7b"
          api_base: "http://ollama.datapond.svc.cluster.local:11434"

# Ollama — reduced resources for single-node dev (16 CPU / 15GB RAM host)
# qwen2.5-coder:7b ~4GB on disk, ~5GB RAM during inference
# Ollama disabled on single-node dev (RAM requests already at 97%).
# Enable on nodes with 32GB+ RAM or after reducing other service requests.
# To enable: set enabled: true and ensure 6GB+ free memory.
ollama:
  enabled: false
  defaultModel: "qwen2.5-coder:7b"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 6Gi
