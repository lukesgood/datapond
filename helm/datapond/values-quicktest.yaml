# Quick Test Configuration
# Based on values-dev.yaml but with Backend/Frontend disabled
# Testing data infrastructure only

# Global settings
global:
  domain: datapond.local
  storageClass: local-path
  imagePullPolicy: IfNotPresent

# Namespace
namespace: datapond

# Ingress
ingress:
  enabled: true
  className: traefik
  tls:
    enabled: false

# Frontend - Unified Management UI
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# Backend - API Server
backend:
  enabled: true
  replicas: 1
  image:
    repository: datapond/backend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70

# PostgreSQL - Reduced resources
postgres:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi

# Valkey - Minimal (Redis-compatible)
valkey:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi

# JupyterLab - Moderate
jupyter:
  enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi
  extensions:
    git: true
    nbdime: true
  gitConfig:
    defaultUser: "DataPond User"
    defaultEmail: "user@datapond.local"

# MLflow - Minimal
mlflow:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi

# Airflow - Minimal activation for Sprint 2 (LocalExecutor)
airflow:
  enabled: true
  name: airflow
  image:
    repository: apache/airflow
    tag: "2.8.1"
  executor: LocalExecutor
  webserver:
    replicas: 1
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  scheduler:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
  worker:
    enabled: false
  persistence:
    enabled: true
    dags:
      size: 5Gi
    logs:
      size: 5Gi
  auth:
    username: airflow
    password: airflow

  # SMTP: disabled by default — configure to enable email alerts
  # smtp:
  #   enabled: true
  #   host: "smtp.gmail.com"
  #   port: "587"
  #   starttls: "True"
  #   ssl: "False"
  #   user: "alerts@company.com"
  #   mailFrom: "DataPond <alerts@company.com>"
  # Then set AIRFLOW_SMTP_PASSWORD in datapond-secrets:
  #   kubectl create secret generic datapond-secrets -n datapond \
  #     --from-literal=AIRFLOW_SMTP_PASSWORD="your-app-password" --dry-run=client -o yaml | kubectl apply -f -
  smtp:
    enabled: false
    host: ""
    port: "587"
    starttls: "True"
    ssl: "False"
    user: ""
    mailFrom: "DataPond Alerts <noreply@datapond.local>"

# Spark - Disabled (insufficient memory: needs 2GB, system at 64% with current workload)
spark:
  enabled: false
  master:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  worker:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    env:
      - name: SPARK_WORKER_CORES
        value: "1"
      - name: SPARK_WORKER_MEMORY
        value: "1G"

# Trino - Minimal (SQL query engine)
trino:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    size: 10Gi

# Apache Polaris - Minimal
polaris:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# RisingWave - Minimal (real-time streaming SQL)
risingwave:
  enabled: true
  image:
    tag: "v1.6.0"  # Trying older stable version
  meta:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  frontend:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  compute:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
  compactor:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# OpenMetadata - Minimal (data catalog and lineage)
openmetadata:
  enabled: true
  server:
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1024m"
  elasticsearch:
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 2Gi
    javaOpts:
      xms: "512m"
      xmx: "1g"
    persistence:
      size: 10Gi

# Monitoring - Disabled for quick test
monitoring:
  enabled: false

# Auth - Simple dev credentials
postgres:
  auth:
    database: datapond
    username: datapond
    password: dev_password

jupyter:
  auth:
    token: "jupyter"   # known dev token (explicit-wins; docs reference it)

storage:
  provider: minio
  endpoint: "minio:9000"
  region: us-east-1

minio:
  enabled: true
  clusterIP: 10.43.107.150
  auth:
    rootUser: datapond
    rootPassword: datapond_dev
  persistence:
    size: 20Gi

# LiteLLM gateway — always-on, lightweight (proxy only, no model weights ~256Mi).
# Single entry point for all LLM providers; backends are added/switched at runtime
# from Settings → AI (DB mode). No seed models — configure via the UI.
litellm:
  enabled: true
  config:
    model_list: []

# Ollama — reduced resources for single-node dev (16 CPU / 15GB RAM host)
# qwen2.5-coder:7b ~4GB on disk, ~5GB RAM during inference
# Ollama disabled on single-node dev (RAM requests already at 97%).
# Enable on nodes with 32GB+ RAM or after reducing other service requests.
# To enable: set enabled: true and ensure 6GB+ free memory.
ollama:
  enabled: false
  defaultModel: "qwen2.5-coder:7b"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 4000m
      memory: 6Gi

# Iceberg 테이블 유지보수 DAG (P0-3) — compaction / expire_snapshots / remove_orphan_files
maintenance:
  schedule: "0 3 * * *"      # 매일 03:00 (cron). ""이면 수동 실행만
  fileSize: "128MB"          # compaction 목표 파일 크기
  snapshotRetention: "7d"    # 스냅샷 보존창 (시간여행 가능 범위) — Trino 최소 7d
  orphanRetention: "7d"      # 고아 파일 보존창 — 동시 적재와의 경쟁 방지 위해 ≥1d 권장
