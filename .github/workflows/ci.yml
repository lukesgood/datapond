name: CI

# PR·main push 시 머지 게이트 — 단위테스트 + 타입체크 + Helm lint.
# (이번 세션의 DatabaseURLConnector NameError 같은 회귀를 머지 전에 차단)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        working-directory: backend
        # backend/tests = 서비스 비의존 단위테스트. 루트 test_*.py(통합 스크립트)는 제외.
        run: |
          python -m pytest tests -q
          PYTHONPATH=../ee/backend python -m pytest ../ee/backend/tests -q

  frontend-check:
    name: Frontend type check + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true   # 경고는 차단하지 않음(점진 정리)

  license-gate:
    name: License gate (direct deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python direct-deps license check
        working-directory: backend
        run: |
          pip install -q -r requirements.txt pip-licenses
          # Direct deps only: names from requirements.txt (strip extras/pins/comments)
          PKGS=$(sed -E 's/\[[^]]*\]//; s/[<>=!~;].*$//' requirements.txt | tr -d ' ' | grep -v '^#' | grep -v '^$' | tr '\n' ' ')
          pip-licenses --format=csv --packages $PKGS | tee /tmp/pylic.csv
          # Denylist (UNKNOWN fails closed); allowlisted packages (.license-allowlist.txt) are accepted-by-review
          viol=$(tail -n +2 /tmp/pylic.csv | awk -F'","' '{ lic=toupper($3); gsub(/"/,"",lic); if (lic ~ /GPL|AGPL|SSPL|ELASTIC|BSL|COMMONS CLAUSE|EPL|MPL|CDDL|UNKNOWN/) print }' | grep -vFf ../.license-allowlist.txt || true)
          if [ -n "$viol" ]; then echo "::error::Disallowed dependency licenses:"; echo "$viol"; exit 1; fi
          echo "OK: python direct deps clean"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm production-deps license check
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npx --yes license-checker --production --csv | tee /tmp/jslic.csv
          # NOTE: npm side scans production-TRANSITIVE deps (license-checker walks the tree); python side is direct-deps-only (--packages). Full transitive/image SBOM coverage is deferred to P0-4.
          viol=$(tail -n +2 /tmp/jslic.csv | awk -F'","' '{ lic=toupper($2); gsub(/"/,"",lic); if (lic ~ /GPL|AGPL|SSPL|ELASTIC|BSL|COMMONS CLAUSE|EPL|MPL|CDDL|UNKNOWN/) print }' | grep -vFf ../.license-allowlist.txt || true)
          if [ -n "$viol" ]; then echo "::error::Disallowed dependency licenses:"; echo "$viol"; exit 1; fi
          echo "OK: npm production deps clean"

  security-scan:
    name: Trivy filesystem scan (dependency vulns / SBOM)
    runs-on: ubuntu-latest
    # Report-only for now (exit-code: 0) — surfaces HIGH/CRITICAL CVEs in
    # backend/requirements.txt + frontend/package-lock.json without blocking builds.
    # P0-2/P0-3 deferred full SBOM/vuln coverage to this job; flip exit-code to 1 once
    # the baseline below is triaged/clean, to make this a real merge gate.
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan (fs mode — no image build required)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"
          # Both dependency files are picked up automatically by fs-mode's
          # lockfile detection (backend/requirements.txt, frontend/package-lock.json).

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart (quicktest profile = 게이트)
        run: helm lint helm/datapond --values helm/datapond/values-quicktest.yaml
      - name: Template render (모든 프로파일 — 구문 검증)
        run: |
          for v in values-quicktest values-onprem values-aws values-dev values-prod values-foundation; do
            f="helm/datapond/$v.yaml"
            [ -f "$f" ] && { echo "== render $v =="; helm template datapond helm/datapond --values "$f" >/dev/null; }
          done
      - name: FEATURE flags reflect component toggles
        run: |
          echo "== values-foundation (trino disabled) must render FEATURE_TRINO false =="
          helm template datapond helm/datapond --values helm/datapond/values-foundation.yaml \
            | grep -A1 'name: FEATURE_TRINO' | grep -q 'value: "false"' \
            || { echo "FAIL: FEATURE_TRINO should be false in values-foundation"; exit 1; }
          echo "== base values (trino enabled) must render FEATURE_TRINO true =="
          helm template datapond helm/datapond \
            | grep -A1 'name: FEATURE_TRINO' | grep -q 'value: "true"' \
            || { echo "FAIL: FEATURE_TRINO should be true in base values"; exit 1; }
          echo "OK: FEATURE flag gating verified"
      - name: Critical secrets generated + injected
        run: |
          echo "== critical secrets generated + injected =="
          helm template datapond helm/datapond | grep -q 'ENCRYPTION_KEY:' || { echo FAIL ENCRYPTION_KEY; exit 1; }
          helm template datapond helm/datapond | grep -q 'ADMIN_PASSWORD:'  || { echo FAIL ADMIN_PASSWORD; exit 1; }
          helm template datapond helm/datapond | grep -q 'name: ENCRYPTION_KEY' || { echo FAIL ENCRYPTION_KEY inject; exit 1; }
          helm template datapond helm/datapond | grep -q 'name: ADMIN_PASSWORD' || { echo FAIL ADMIN_PASSWORD inject; exit 1; }
          echo "== no duplicate ENCRYPTION_KEY env (stale backend.env would shadow the injection) =="
          for v in "" "--values helm/datapond/values-quicktest.yaml" "--values helm/datapond/values-onprem.yaml"; do
            n=$(helm template datapond helm/datapond $v | grep -c 'name: ENCRYPTION_KEY')
            [ "$n" -eq 1 ] || { echo "FAIL: ENCRYPTION_KEY env appears $n times (profile: ${v:-base})"; exit 1; }
          done
          echo "OK: secrets wired"
          echo "== component credentials generated (P0-1b, onprem render) =="
          # NOTE: here-strings (grep <<<"$VAR"), NOT echo "$VAR" | grep — same SIGPIPE
          # hazard as the P0-4 image-tag checks below; reproduced locally on a large render.
          out=$(helm template datapond helm/datapond --values helm/datapond/values-onprem.yaml)
          for k in POSTGRES_PASSWORD S3_SECRET_KEY AIRFLOW_PASSWORD JUPYTER_TOKEN POLARIS_CLIENT_SECRET; do
            grep -q "$k:" <<<"$out" || { echo "FAIL $k not generated"; exit 1; }
          done
          grep -q 'token="${JUPYTER_TOKEN}"' <<<"$out" || { echo "FAIL jupyter token still hardcoded"; exit 1; }
          echo "== no weak literals in rendered manifests (base/prod/onprem/foundation) =="
          for v in "" "--values helm/datapond/values-prod.yaml" "--values helm/datapond/values-onprem.yaml" "--values helm/datapond/values-foundation.yaml"; do
            r=$(helm template datapond helm/datapond $v)
            if grep -E 'CHANGE_THIS|changeme|datapond_password|datapond_s3_password' <<<"$r"; then
              echo "FAIL: weak credential literal rendered (profile: ${v:-base})"; exit 1
            fi
            if grep -q 'AIRFLOW_PASSWORD: "airflow"' <<<"$r"; then
              echo "FAIL: weak airflow password rendered (profile: ${v:-base})"; exit 1
            fi
          done
          echo "OK: component credentials wired"
          echo "== OIDC env wiring (enterprise SSO) =="
          r=$(helm template datapond helm/datapond \
            --set auth.oidc.enabled=true --set auth.oidc.issuer=https://idp.example \
            --set auth.oidc.clientId=cid --set auth.oidc.clientSecret=csecret)
          grep -q 'name: OIDC_CLIENT_SECRET' <<<"$r" || { echo "FAIL OIDC secretKeyRef"; exit 1; }
          grep -q 'OIDC_CLIENT_SECRET: "csecret"' <<<"$r" || { echo "FAIL OIDC secret entry"; exit 1; }
          grep -q 'name: OIDC_ISSUER' <<<"$r" || { echo "FAIL OIDC env"; exit 1; }
          # Match only DataPond's OIDC envs/secret — not Polaris's unrelated
          # QUARKUS_OIDC_TENANT_ENABLED (which renders unconditionally in the base profile).
          if helm template datapond helm/datapond | grep -qE 'name: OIDC_|OIDC_CLIENT_SECRET:'; then
            echo "FAIL: OIDC leaks into default render"; exit 1
          fi
          echo "OK: OIDC wired"
          echo "== no moving image tags (P0-4) =="
          # NOTE: use here-strings (grep <<<"$VAR"), NOT echo "$VAR" | grep — see the
          # lakehouse-IRSA SIGPIPE note further down for why `echo | grep -q` false-fails
          # under `bash -eo pipefail` on a large render.
          MOVING='(:latest|:main-latest|:main|:stable|:edge|:nightly)$'
          # Family/rolling tags: a version tag with no patch component, e.g. "pg16",
          # "16-alpine", "20-alpine" — these track upstream's rolling family branch and
          # drift unpinned even though they look versioned. A concrete pin either has a "."
          # (16.14-alpine, 0.8.4-pg16, v1.91.0, 3.11.15-slim, 1.36.1, RELEASE.2025-...) or is
          # a documented bare-version exception below. Tags with a "." are never flagged here.
          FAMILY_RE='^[a-z]*[0-9]+(-[a-z0-9]+)?$'
          # Bare (dot-less) tags that ARE already fully concrete, allowlisted per-image and
          # cross-checked against docs/superpowers/plans/p0-4-pinned-versions.md:
          #   482 -> trinodb/trino uses monotonic integer release numbers (no semver patch to omit)
          FAMILY_ALLOWLIST='^(482)$'
          is_family_tag() {
            # $1 = bare tag (no image name/repo, no leading colon)
            case "$1" in
              *.*) return 1 ;;  # has a dot -> treated as a concrete pin
            esac
            grep -qE "$FAMILY_RE" <<<"$1" && ! grep -qE "$FAMILY_ALLOWLIST" <<<"$1"
          }
          for v in "" "--values helm/datapond/values-prod.yaml" "--values helm/datapond/values-onprem.yaml" \
                   "--values helm/datapond/values-quicktest.yaml" "--values helm/datapond/values-foundation.yaml" \
                   "--values helm/datapond/values-aws.yaml"; do
            imgs=$(helm template datapond helm/datapond $v | grep -E '^\s*image:' | sed -E 's/.*image:\s*"?([^"]+)"?.*/\1/' || true)
            if grep -qE "$MOVING" <<<"$imgs"; then
              echo "FAIL: moving image tag in profile ${v:-base}:"; grep -E "$MOVING" <<<"$imgs"; exit 1
            fi
            if grep -qvE ':' <<<"$imgs"; then
              echo "FAIL: untagged image in profile ${v:-base}:"; grep -vE ':' <<<"$imgs"; exit 1
            fi
            while IFS= read -r img; do
              [ -z "$img" ] && continue
              tag="${img##*:}"
              if is_family_tag "$tag"; then
                echo "FAIL: family/rolling image tag (no patch version) in profile ${v:-base}: $img"; exit 1
              fi
            done <<<"$imgs"
          done
          echo "== no moving Docker base images =="
          bimgs=$(grep -hE '^FROM ' backend/Dockerfile frontend/Dockerfile docker/jupyter/Dockerfile \
            | sed -E 's/[[:space:]]+[Aa][Ss][[:space:]]+[A-Za-z0-9_.-]+[[:space:]]*$//' \
            | awk '{print $2}' | grep -E '[:/]' || true)
          if grep -qE "$MOVING|:3.11-slim$|:20-alpine$" <<<"$bimgs"; then
            echo "FAIL: moving Docker base image:"; grep -E "$MOVING|:3.11-slim$|:20-alpine$" <<<"$bimgs"; exit 1
          fi
          if grep -qvE ':' <<<"$bimgs"; then
            echo "FAIL: untagged Docker base image:"; grep -vE ':' <<<"$bimgs"; exit 1
          fi
          while IFS= read -r bimg; do
            [ -z "$bimg" ] && continue
            tag="${bimg##*:}"
            if is_family_tag "$tag"; then
              echo "FAIL: family/rolling Docker base image tag (no patch version): $bimg"; exit 1
            fi
          done <<<"$bimgs"
          echo "OK: no moving image tags"
          echo "== lakehouse IRSA ServiceAccounts =="
          # NOTE: use here-strings (grep -q PATTERN <<<"$VAR"), NOT echo "$VAR" | grep -q.
          # Under `bash -eo pipefail` (GH Actions default) grep -q closes stdin early on a
          # large render → echo gets SIGPIPE(141) → pipefail reports 141 → false failures.
          # default render (no roleArn): 6 SAs exist, NO IRSA annotation leaks
          d=$(helm template datapond helm/datapond --values helm/datapond/values-onprem.yaml)
          for sa in datapond-backend datapond-trino datapond-spark datapond-jupyter datapond-mlflow datapond-polaris; do
            grep -q "name: $sa" <<<"$d" || { echo "FAIL: SA $sa missing (onprem render)"; exit 1; }
          done
          if grep -q 'eks.amazonaws.com/role-arn' <<<"$d"; then
            echo "FAIL: IRSA annotation leaked into a no-roleArn render"; exit 1
          fi
          # with roleArn set: annotation renders on the SAs
          a=$(helm template datapond helm/datapond --values helm/datapond/values-onprem.yaml --set lakehouseIrsa.roleArn=arn:aws:iam::123456789012:role/datapond-lakehouse-s3)
          grep -q 'eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/datapond-lakehouse-s3"' <<<"$a" || { echo "FAIL: IRSA annotation not rendered when roleArn set"; exit 1; }
          grep -q 'serviceAccountName: datapond-backend' <<<"$a" || { echo "FAIL: backend serviceAccountName not set"; exit 1; }
          echo "OK: lakehouse IRSA wired"

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"
      - name: fmt
        run: terraform -chdir=terraform fmt -check -recursive
      - name: validate (main)
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate
      - name: validate (bootstrap)
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false -input=false
          terraform -chdir=terraform/bootstrap validate
